# =============================================================================
# awesome-hub-generator 配置文件
# 用户只需编辑此文件，其余自动生成
# =============================================================================

project:
  name: "Awesome CAD Hub"
  description: "A curated hub for CAD papers, datasets, tools, and Neural CAD research."
  github_url: "https://github.com/jin-s13/awesome-cad-hub"
  site_url: "https://jin-s13.github.io/awesome-cad-hub"
  generator_repo: "jin-s13/awesome-hub-generator"

research:
  # === 搜索关键词（支持引号包裹短语） ===
  keywords:
    - "CAD"
    - "B-Rep"
    - "parametric CAD"
    - "CAD generation"
    - "CAD reconstruction"
    - "text-to-CAD"
    - "CAD program"

  # === 负向关键词（命中直接排除） ===
  negative_keywords:
    # 医学
    - "medical imaging"
    - "weather forecast"
    - "protein folding"
    - "drug discovery"
    - "cancer detection"
    - "breast cancer"
    - "thyroid cancer"
    - "coronary artery"
    - "cardiovascular"
    - "mammogr"
    - "radiology"
    - "clinical diagnosis"
    - "dental"
    - "caries"
    - "molar"
    - "tumor"
    - "lesion segmentation"
    - "ECG"
    - "EEG"
    - "blood pressure"
    - "diabetes"
    - "COVID"
    - "pneumonia"
    - "skin lesion"
    # 金融
    - "financial"
    - "stock market"
    - "trading"
    - "cryptocurr"
    - "look-ahead bias"
    # 机器人/操控
    - "dexterous manipulation"
    - "humanoid"
    - "grasping"
    - "robot manipulation"
    # 环境/气候
    - "climate"
    - "weather"
    # 微流控/生物
    - "microfluidic"
    - "live-cell"
    # 其他不相关
    - "anomaly detection"
    - "defect detection"
    - "point cloud registration"
    - "articulated pose"
    - "category-level pose"
    - "egocentric"
    - "sim-to-real"

  # === 领域加分词（额外加权） ===
  domain_boost_keywords:
    - "neural CAD"
    - "generative CAD"
    - "point cloud"
    - "mesh"

  # === arXiv 分类过滤 ===
  arxiv_categories:
    - "cs.CV"
    - "cs.GR"
    - "cs.LG"
    - "cs.AI"

  # === 全量构建的起始日期 ===
  date_from: "2020-01-01"

  # === 每日搜索的天数范围 ===
  daily_search_days: 3

  # === 数据源开关 ===
  sources:
    arxiv: true
    huggingface_daily: true
    huggingface_trending: true

  # === 自动发现 GitHub 已有 awesome 项目 ===
  auto_discover:
    enabled: true
    min_stars: 5
    max_sources: 10

  # === 评分配置 ===
  scoring:
    base_score: 1.5            # 基础分
    weight_coefficient: 2.5    # 权重系数
    max_score_per_keyword: 10  # 每个关键词最高分
    filter_min_score: 5.0      # 低于此分数的论文被过滤
    author_bonus:              # 专家作者加分
      enabled: false
      bonus_points: 5.0
      expert_authors: []

  # === 深度分析配置 ===
  deep_analysis:
    enabled: true               # 是否对高分论文做 PDF 深度分析
    min_score: 30               # 最低评分门槛
    pdf_parser: "mineru"       # pymupdf（本地）或 mineru（云端）
    max_papers_per_run: 10      # 每次运行最多分析多少篇

  # === 元数据富化配置 ===
  enrichment:
    enabled: true
    max_concurrent: 10           # 并发数
    request_timeout: 30          # 单篇超时（秒）
    extract_affiliations: true   # 是否提取机构
    extract_figures: true        # 是否提取图片
    extract_methods: true        # 是否提取方法名

  # === 论文分级配置 ===
  grading:
    enabled: true
    must_read_min_score: 40      # 必读门槛
    worth_reading_min_score: 20  # 值得看门槛
    # 低于 worth_reading_min_score 的为"可跳过"

  # === 跨天去重历史记录 ===
  history:
    enabled: true
    retention_days: 30           # 保留天数
    min_papers_per_run: 20       # 最少论文数（不足时回填）
    weekend_mode: true           # 周末模式

  # === 图片本地化 ===
  image_localization:
    enabled: true
    check_reachability: true     # 检查图片可达性
    download_fallback: true      # 不可达时下载到本地
    pdf_extract_fallback: true   # 从 PDF 提取作为最终 fallback

  # === 关键词趋势追踪 ===
  keyword_tracking:
    enabled: true
    report_frequency: "weekly"  # daily / weekly / monthly / always

website:
  sections:
    papers: true
    datasets: true
    tools: true
  nav:
    - label: "Home"
      href: "/"
    - label: "Papers"
      href: "/papers"
    - label: "Datasets"
      href: "/datasets"
    - label: "Tools"
      href: "/tools"
  footer: |
    Built with <a href="https://github.com/jin-s13/awesome-hub-generator">awesome-hub-generator</a>.
