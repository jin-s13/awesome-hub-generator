- id: a-self-supervised-framework-for-space-object-behaviour-chara-2025
  title: A Self-Supervised Framework for Space Object Behaviour Characterisation
  abstract: Foundation Models, which leverage large neural networks pre-trained on unlabelled data before fine-tuning for
    specific tasks, are increasingly being applied to specialised domains. Recent examples include ClimaX for climate and
    Clay for satellite Earth observation, but a Foundation Model for Space Object Behavioural Analysis has not yet been developed.
    As orbital populations grow, automated methods for characterising space object behaviour are crucial for space safety.
    Here, we present a self-supervised framework for space object behavioural analysis, representing a first step towards
    a Foundation Model for SOBA. The backbone is a Perceiver-Variational Autoencoder (VAE) architecture, pre-trained with
    self-supervised reconstruction and masked reconstruction on 227,000 light curves from the MMT-9 observatory. The VAE enables
    anomaly detection, motion prediction, and synthetic light curve generation. We fine-tuned the model using two independent
    light curve simulators (CASSANDRA and GRIAL), with CAD models of boxwing, Sentinel-3, SMOS, and Starlink platforms. Our
    pre-trained model achieved a reconstruction mean squared error of 0.009, identifying potentially anomalous light curves
    through reconstruction difficulty. After fine-tuning, the model scored 85% and 82% accuracy, with 0.92 and 0.95 ROC AUC
    scores in anomaly detection and motion mode prediction (e.g., sun-pointing, spin, tumbling). Analysis of high-confidence
    predictions on real data revealed distinct patterns including characteristic object profiles and satellite glinting. Our
    work demonstrates how self-supervised learning can simultaneously enable anomaly detection, motion prediction, and synthetic
    data generation from rich pre-trained representations, supporting space safety and sustainability through automated monitoring
    and simulation.
