- id: hierarchical-error-assessment-of-cad-models-for-aircraft-man-2025
  title: Hierarchical Error Assessment of CAD Models for Aircraft Manufacturing-and-Measurement
  abstract: 'The most essential feature of aviation equipment is high quality, including high performance, high stability
    and high reliability. In this paper, we propose a novel hierarchical error assessment framework for aircraft CAD models
    within a manufacturing-and-measurement platform, termed HEA-MM. HEA-MM employs structured light scanners to obtain comprehensive
    3D measurements of manufactured workpieces. The measured point cloud is registered with the reference CAD model, followed
    by an error analysis conducted at three hierarchical levels: global, part, and feature. At the global level, the error
    analysis evaluates the overall deviation of the scanned point cloud from the reference CAD model. At the part level, error
    analysis is performed on these patches underlying the point clouds. We propose a novel optimization-based primitive refinement
    method to obtain a set of meaningful patches of point clouds. Two basic operations, splitting and merging, are introduced
    to refine the coarse primitives. At the feature level, error analysis is performed on circular holes, which are commonly
    found in CAD models. To facilitate it, a two-stage algorithm is introduced for the detection of circular holes. First,
    edge points are identified using a tensor-voting algorithm. Then, multiple circles are fitted through a hypothesize-and-clusterize
    framework, ensuring accurate detection and analysis of the circular features. Experimental results on various aircraft
    CAD models demonstrate the effectiveness of our proposed method.'
