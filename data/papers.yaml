- id: cabbage-a-differential-growth-framework-for-open-surfaces-2025
  title: 'Cabbage: A Differential Growth Framework for Open Surfaces'
  abstract: We propose Cabbage, a differential growth framework to model buckling behavior in 3D open surfaces found in nature-like
    the curling of flower petals. Cabbage creates high-quality triangular meshes free of self-intersection. Cabbage-Shell
    is driven by edge subdivision which differentially increases discretization resolution. Shell forces expands the surface,
    generating buckling over time. Feature-aware smoothing and remeshing ensures mesh quality. Corrective collision effectively
    prevents self-collision even in tight spaces. We additionally provide Cabbage-Collision, and approximate alternative,
    followed by CAD-ready surface generation. Cabbage is the first open-source effort with this calibre and robustness, outperforming
    SOTA methods in its morphological expressiveness, mesh quality, and stably generates large, complex patterns over hundreds
    of simulation steps. It is a source not only of computational modeling, digital fabrication, education, but also high-quality,
    annotated data for geometry processing and shape analysis.
