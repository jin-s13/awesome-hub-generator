- id: pca-based-interpretable-knowledge-representation-and-analysi-2026
  title: PCA-Based Interpretable Knowledge Representation and Analysis of Geometric Design Parameters
  abstract: In many CAD-based applications, complex geometries are defined by a high number of design parameters. This leads
    to high-dimensional design spaces that are challenging for downstream engineering processes like simulations, optimization,
    and design exploration tasks. Therefore, dimension reduction methods such as principal component analysis (PCA) are used.
    The PCA identifies dominant modes of geometric variation and yields a compact representation of the geometry. While classical
    PCA excels in the compact representation part, it does not directly recover underlying design parameters of a generated
    geometry. In this work, we deal with the problem of estimating design parameters from PCA-based representations. Analyzing
    a recent modification of the PCA dedicated to our field of application, we show that the results are actually identical
    to the standard PCA. We investigate limitations of this approach and present reasonable conditions under which accurate,
    interpretable parameter estimation can be obtained. With the help of dedicated experiments, we take a more in-depth look
    at every stage of the PCA and the possible changes of the geometry during these processes.
