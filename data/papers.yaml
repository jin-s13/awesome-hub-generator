- id: caddreamer-cad-object-generation-from-single-view-images-2025
  title: 'CADDreamer: CAD Object Generation from Single-view Images'
  abstract: Diffusion-based 3D generation has made remarkable progress in recent years. However, existing 3D generative models
    often produce overly dense and unstructured meshes, which stand in stark contrast to the compact, structured, and sharply-edged
    Computer-Aided Design (CAD) models crafted by human designers. To address this gap, we introduce CADDreamer, a novel approach
    for generating boundary representations (B-rep) of CAD objects from a single image. CADDreamer employs a primitive-aware
    multi-view diffusion model that captures both local geometric details and high-level structural semantics during the generation
    process. By encoding primitive semantics into the color domain, the method leverages the strong priors of pre-trained
    diffusion models to align with well-defined primitives. This enables the inference of multi-view normal maps and semantic
    maps from a single image, facilitating the reconstruction of a mesh with primitive labels. Furthermore, we introduce geometric
    optimization techniques and topology-preserving extraction methods to mitigate noise and distortion in the generated primitives.
    These enhancements result in a complete and seamless B-rep of the CAD model. Experimental results demonstrate that our
    method effectively recovers high-quality CAD objects from single-view images. Compared to existing 3D generation techniques,
    the B-rep models produced by CADDreamer are compact in representation, clear in structure, sharp in edges, and watertight
    in topology.
