- id: an-industrial-dataset-for-scene-acquisitions-and-functional-2026
  title: An Industrial Dataset for Scene Acquisitions and Functional Schematics Alignment
  abstract: Aligning functional schematics with 2D and 3D scene acquisitions is crucial for building digital twins, especially
    for old industrial facilities that lack native digital models. Current manual alignment using images and LiDAR data does
    not scale due to tediousness and complexity of industrial sites. Inconsistencies between schematics and reality, and the
    scarcity of public industrial datasets, make the problem both challenging and underexplored. This paper introduces IRIS-v2,
    a comprehensive dataset to support further research. It includes images, point clouds, 2D annotated boxes and segmentation
    masks, a CAD model, 3D pipe routing information, and the PID (Piping and Instrumentation Diagram). The alignment is experimented
    on a practical case study, aiming at reducing the time required for this task by combining segmentation and graph matching.
