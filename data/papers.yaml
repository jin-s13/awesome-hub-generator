- id: ricau-net-residual-block-inspired-coordinate-attention-u-ne-2024
  title: 'RICAU-Net: Residual-block Inspired Coordinate Attention U-Net for Segmentation of Small and Sparse Calcium Lesions
    in Cardiac CT'
  abstract: The Agatston score, which is the sum of the calcification in the four main coronary arteries, has been widely
    used in the diagnosis of coronary artery disease (CAD). However, many studies have emphasized the importance of the vessel-specific
    Agatston score, as calcification in a specific vessel is significantly correlated with the occurrence of coronary heart
    disease (CHD). In this paper, we propose the Residual-block Inspired Coordinate Attention U-Net (RICAU-Net), which incorporates
    coordinate attention in two distinct manners and a customized combo loss function for lesion-specific coronary artery
    calcium (CAC) segmentation. This approach aims to tackle the high class-imbalance issue associated with small and sparse
    CAC lesions. Experimental results and the ablation study demonstrate that the proposed method outperforms the five other
    U-Net based methods used in medical applications, by achieving the highest per-lesion Dice scores across all four lesions.
