- id: gs2pose-two-stage-6d-object-pose-estimation-guided-by-gauss-2024
  title: 'GS2Pose: Two-stage 6D Object Pose Estimation Guided by Gaussian Splatting'
  abstract: This paper proposes a new method for accurate and robust 6D pose estimation of novel objects, named GS2Pose. By
    introducing 3D Gaussian splatting, GS2Pose can utilize the reconstruction results without requiring a high-quality CAD
    model, which means it only requires segmented RGBD images as input. Specifically, GS2Pose employs a two-stage structure
    consisting of coarse estimation followed by refined estimation. In the coarse stage, a lightweight U-Net network with
    a polarization attention mechanism, called Pose-Net, is designed. By using the 3DGS model for supervised training, Pose-Net
    can generate NOCS images to compute a coarse pose. In the refinement stage, GS2Pose formulates a pose regression algorithm
    following the idea of reprojection or Bundle Adjustment (BA), referred to as GS-Refiner. By leveraging Lie algebra to
    extend 3DGS, GS-Refiner obtains a pose-differentiable rendering pipeline that refines the coarse pose by comparing the
    input images with the rendered images. GS-Refiner also selectively updates parameters in the 3DGS model to achieve environmental
    adaptation, thereby enhancing the algorithm's robustness and flexibility to illuminative variation, occlusion, and other
    challenging disruptive factors. GS2Pose was evaluated through experiments conducted on the LineMod dataset, where it was
    compared with similar algorithms, yielding highly competitive results. The code for GS2Pose will soon be released on GitHub.
