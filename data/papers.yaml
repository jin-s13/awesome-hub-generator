- id: t2t-la-a-topology-to-topology-llm-agent-for-graph-learning-2025
  title: 'T2T-LA: A Topology-to-Topology LLM Agent for Graph Learning with Neither Feature Access nor Task Knowledge'
  abstract: Graph learning aims to convert data into graph representations, which are fundamental to many problems in machine
    learning for CAD, where circuits, layouts, designs, and optimization states are often modeled as graph-structured objects.
    Existing graph learning methods usually rely on carefully designed graph construction rules, extensive parameter tuning,
    and sophisticated mathematical theory; moreover, achieving good performance often requires task-specific graph construction
    tailored to the downstream objective. In this work, we study whether a large language model (LLM) can reason about graph
    structure and infer a useful topology without observing the feature matrix, without knowing the downstream task, and without
    relying on any carefully designed graph construction algorithm or parameter tuning process. To this end, we propose T2T-LA,
    a Topology-to-Topology LLM Agent that receives no input other than a set of previously failed topologies and the scores
    assigned to them by a private scorer. The agent is not told what task or algorithm produces the scores, how these topologies
    are generated, or what the scores mean. Since none of the observed topologies is satisfactory, T2T-LA cannot simply imitate
    a good example. Instead, it is forced to infer hidden relationships between graph connectivity patterns and the observed
    scores, a capability that is particularly relevant to CAD scenarios where useful design structures may be difficult to
    specify manually. Experimental results show that T2T-LA can generate, in one shot, a graph topology that enables the downstream
    algorithm to produce a sufficiently good solution, suggesting a new LLM-driven direction for topology reasoning and graph
    representation learning in ML-for-CAD workflows.
