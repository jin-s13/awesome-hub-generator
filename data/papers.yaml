- id: hola-b-rep-generation-using-a-holistic-latent-representatio-2025
  title: 'HoLa: B-Rep Generation using a Holistic Latent Representation'
  abstract: 'We introduce a novel representation for learning and generating Computer-Aided Design (CAD) models in the form
    of $\textit{boundary representations}$ (B-Reps). Our representation unifies the continuous geometric properties of B-Rep
    primitives in different orders (e.g., surfaces and curves) and their discrete topological relations in a $\textit{holistic
    latent}$ (HoLa) space. This is based on the simple observation that the topological connection between two surfaces is
    intrinsically tied to the geometry of their intersecting curve. Such a prior allows us to reformulate topology learning
    in B-Reps as a geometric reconstruction problem in Euclidean space. Specifically, we eliminate the presence of curves,
    vertices, and all the topological connections in the latent space by learning to distinguish and derive curve geometries
    from a pair of surface primitives via a neural intersection network. To this end, our holistic latent space is only defined
    on surfaces but encodes a full B-Rep model, including the geometry of surfaces, curves, vertices, and their topological
    relations. Our compact and holistic latent space facilitates the design of a first diffusion-based generator to take on
    a large variety of inputs including point clouds, single/multi-view images, 2D sketches, and text prompts. Our method
    significantly reduces ambiguities, redundancies, and incoherences among the generated B-Rep primitives, as well as training
    complexities inherent in prior multi-step B-Rep learning pipelines, while achieving greatly improved validity rate over
    current state of the art: 82% vs. $\approx$50%.'
