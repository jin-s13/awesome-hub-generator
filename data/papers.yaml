- id: clarify-before-you-draw-proactive-agents-for-robust-text-to-2026
  title: 'Clarify Before You Draw: Proactive Agents for Robust Text-to-CAD Generation'
  abstract: 'Large language models have recently enabled text-to-CAD systems that synthesize parametric CAD programs (e.g.,
    CadQuery) from natural-language prompts. In practice, however, geometric descriptions can be under-specified or internally
    inconsistent: critical dimensions may be missing and constraints may conflict. However, existing fine-tuned models tend
    to reactively follow the user instructions and hallucinate dimensions when the text is ambiguous. To address this, we
    propose a proactive agentic framework for text-to-CadQuery generation, named as ProCAD, that resolves specification issues
    before code synthesis. Our framework pairs a proactive clarifying agent, which audits the prompt and asks targeted clarification
    questions only when necessary to produce a self-consistent specification, with a CAD coding agent that translates the
    specification into an executable CadQuery program. We fine-tune the coding agent based on a curated high-quality text-to-CadQuery
    dataset and train the clarifying agent via agentic SFT on clarification trajectories. Experiments show that proactive
    clarification significantly improves robustness to ambiguous prompts while keeping interaction overhead low. ProCAD outperforms
    frontier closed-source models, including Claude Sonnet 4.5, reducing the mean Chamfer distance by 79.9% and lowering the
    invalidity ratio from 4.8% to 0.9%. Our code and datasets are made publicly available on https://github.com/BoYuanVisionary/Pro-CAD.'
