- id: cadvlm-bridging-language-and-vision-in-the-generation-of-pa-2024
  title: 'CadVLM: Bridging Language and Vision in the Generation of Parametric CAD Sketches'
  abstract: Parametric Computer-Aided Design (CAD) is central to contemporary mechanical design. However, it encounters challenges
    in achieving precise parametric sketch modeling and lacks practical evaluation metrics suitable for mechanical design.
    We harness the capabilities of pre-trained foundation models, renowned for their successes in natural language processing
    and computer vision, to develop generative models specifically for CAD. These models are adept at understanding complex
    geometries and design reasoning, a crucial advancement in CAD technology. In this paper, we propose CadVLM, an end-to-end
    vision language model for CAD generation. Our approach involves adapting pre-trained foundation models to manipulate engineering
    sketches effectively, integrating both sketch primitive sequences and sketch images. Extensive experiments demonstrate
    superior performance on multiple CAD sketch generation tasks such as CAD autocompletion, CAD autoconstraint, and image
    conditional generation. To our knowledge, this is the first instance of a multimodal Large Language Model (LLM) being
    successfully applied to parametric CAD generation, representing a pioneering step in the field of computer-aided mechanical
    design.
