- id: dart-a-design-aware-microfluidic-chip-paradigm-for-real-tim-2026
  title: 'DART: A design-aware microfluidic chip paradigm for real-time live-cell image analysis'
  abstract: High-throughput microfluidic live-cell imaging generates rich single-cell data. Yet semi-automated procedures
    for locating regions of interest (RoIs), each containing one cell population, and removing surrounding microfluidic structures
    from recorded images, scale with the number of RoIs. This prevents real-time image analysis and delays time-to-insight
    by hours to days. We introduce the Design-Aware and Real-Time capable (DART) paradigm for microfluidic cultivation chips,
    which aligns the CAD blueprint with the physical chip and thereby enables throughput-independent localization of all RoIs
    and fully automated image processing across diverse RoI geometries and chip layouts. DART establishes this alignment through
    embedded fiducial markers and deep-learning-based marker detection. We validate DART using the Swiss Army Knife chip,
    which combines eight structurally distinct RoI designs across 1164 RoI locations. DART localizes all RoIs in five minutes,
    removes microfluidic structures from raw microscopy images in 40 ms, and performs fully automated image analysis, including
    cell segmentation, in under 1.1 s per image. Together, these capabilities establish DART as an end-to-end hardware-software
    paradigm with real-time-capable analysis that paves the way toward closed-loop and outcome-driven smart microscopy.
