- id: a-review-of-10-years-of-protospace-spacecraft-cad-visualiza-2025
  title: 'A Review of 10 Years of ProtoSpace: Spacecraft CAD Visualization in Collaborative Augmented Reality'
  abstract: 'ProtoSpace is a custom JPL-built platform to help scientists and engineers visualize their CAD models collaboratively
    in augmented reality (AR) and on the web in 3D. In addition to this main use case, ProtoSpace has been used throughout
    the entire spacecraft mission lifecycle and beyond: ventilator design and assembly; providing AR-based instructions to
    astronauts in-training; educating the next generation on the process of spacecraft design; etc. ProtoSpace has been used
    for a decade by NASA missions-including Mars Perseverance, Europa Clipper, NISAR, SPHEREx, CAL, and Mars Sample Return-to
    reduce cost and risk by helping engineers and scientists fix problems earlier through reducing miscommunication and helping
    people understand the spatial context of their spacecraft in the appropriate physical context more quickly. This paper
    will explore how ProtoSpace came to be, define the system architecture and overview-including HoloLens and 3D web clients,
    the ProtoSpace server, and the CAD model optimizer-and dive into the use cases, spin-offs, and lessons learned that led
    to 10 years of success at NASA''s Jet Propulsion Laboratory.'
