- id: dealing-with-uncertainty-in-contextual-anomaly-detection-2025
  title: Dealing with Uncertainty in Contextual Anomaly Detection
  abstract: Contextual anomaly detection (CAD) aims to identify anomalies in a target (behavioral) variable conditioned on
    a set of contextual variables that influence the normalcy of the target variable but are not themselves indicators of
    anomaly. In many anomaly detection tasks, there exist contextual variables that influence the normalcy of the target variable
    but are not themselves indicators of anomaly. In this work, we propose a novel framework for CAD, normalcy score (NS),
    that explicitly models both the aleatoric and epistemic uncertainties. Built on heteroscedastic Gaussian process regression,
    our method regards the Z-score as a random variable, providing confidence intervals that reflect the reliability of the
    anomaly assessment. Through experiments on benchmark datasets and a real-world application in cardiology, we demonstrate
    that NS outperforms state-of-the-art CAD methods in both detection accuracy and interpretability. Moreover, confidence
    intervals enable an adaptive, uncertainty-driven decision-making process, which may be very important in domains such
    as healthcare.
