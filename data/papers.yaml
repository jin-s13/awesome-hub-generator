- id: checkmanual-a-new-challenge-and-benchmark-for-manual-based-2025
  title: 'CheckManual: A New Challenge and Benchmark for Manual-based Appliance Manipulation'
  abstract: Correct use of electrical appliances has significantly improved human life quality. Unlike simple tools that can
    be manipulated with common sense, different parts of electrical appliances have specific functions defined by manufacturers.
    If we want the robot to heat bread by microwave, we should enable them to review the microwave manual first. From the
    manual, it can learn about component functions, interaction methods, and representative task steps about appliances. However,
    previous manual-related works remain limited to question-answering tasks while existing manipulation researchers ignore
    the manual's important role and fail to comprehend multi-page manuals. In this paper, we propose the first manual-based
    appliance manipulation benchmark CheckManual. Specifically, we design a large model-assisted human-revised data generation
    pipeline to create manuals based on CAD appliance models. With these manuals, we establish novel manual-based manipulation
    challenges, metrics, and simulator environments for model performance evaluation. Furthermore, we propose the first manual-based
    manipulation planning model ManualPlan to set up a group of baselines for the CheckManual benchmark.
