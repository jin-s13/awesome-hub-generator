- id: brepformer-transformer-based-b-rep-geometric-feature-recogn-2025
  title: 'BRepFormer: Transformer-Based B-rep Geometric Feature Recognition'
  abstract: Recognizing geometric features on B-rep models is a cornerstone technique for multimedia content-based retrieval
    and has been widely applied in intelligent manufacturing. However, previous research often merely focused on Machining
    Feature Recognition (MFR), falling short in effectively capturing the intricate topological and geometric characteristics
    of complex geometry features. In this paper, we propose BRepFormer, a novel transformer-based model to recognize both
    machining feature and complex CAD models' features. BRepFormer encodes and fuses the geometric and topological features
    of the models. Afterwards, BRepFormer utilizes a transformer architecture for feature propagation and a recognition head
    to identify geometry features. During each iteration of the transformer, we incorporate a bias that combines edge features
    and topology features to reinforce geometric constraints on each face. In addition, we also proposed a dataset named Complex
    B-rep Feature Dataset (CBF), comprising 20,000 B-rep models. By covering more complex B-rep models, it is better aligned
    with industrial applications. The experimental results demonstrate that BRepFormer achieves state-of-the-art accuracy
    on the MFInstSeg, MFTRCAD, and our CBF datasets.
