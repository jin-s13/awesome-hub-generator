- id: distributed-u-net-model-and-image-segmentation-for-lung-canc-2025
  title: Distributed U-net model and Image Segmentation for Lung Cancer Detection
  abstract: Until now, in the wake of the COVID-19 pandemic in 2019, lung diseases, especially diseases such as lung cancer
    and chronic obstructive pulmonary disease (COPD), have become an urgent global health issue. In order to mitigate the
    goal problem, early detection and accurate diagnosis of these conditions are critical for effective treatment and improved
    patient outcomes. To further research and reduce the error rate of hospital diagnoses, this comprehensive study explored
    the potential of computer-aided design (CAD) systems, especially utilizing advanced deep learning models such as U-Net.
    And compared with the literature content of other authors, this study explores the capabilities of U-Net in detail, and
    enhances the ability to simulate CAD systems through the VGG16 algorithm. An extensive dataset consisting of lung CT images
    and corresponding segmentation masks, curated collaboratively by multiple academic institutions, serves as the basis for
    empirical validation. In this paper, the efficiency of U-Net model is evaluated rigorously and precisely under multiple
    hardware configurations, such as single CPU, single GPU, distributed GPU and federated learning, and the effectiveness
    and development of the method in the segmentation task of lung disease are demonstrated. Empirical results clearly affirm
    the robust performance of the U-Net model, most effectively utilizing four GPUs for distributed learning, and these results
    highlight the potential of U-Net-based CAD systems for accurate and timely lung disease detection and diagnosis huge potential.
