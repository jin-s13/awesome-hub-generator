- id: automatic-feature-recognition-and-dimensional-attributes-ext-2024
  title: Automatic Feature Recognition and Dimensional Attributes Extraction From CAD Models for Hybrid Additive-Subtractive
    Manufacturing
  abstract: The integration of Computer-Aided Design (CAD), Computer-Aided Process Planning (CAPP), and Computer-Aided Manufacturing
    (CAM) plays a crucial role in modern manufacturing, facilitating seamless transitions from digital designs to physical
    products. However, a significant challenge within this integration is the Automatic Feature Recognition (AFR) of CAD models,
    especially in the context of hybrid manufacturing that combines subtractive and additive manufacturing processes. Traditional
    AFR methods, focused mainly on the identification of subtractive (machined) features including holes, fillets, chamfers,
    pockets, and slots, fail to recognize features pertinent to additive manufacturing. Furthermore, the traditional methods
    fall short in accurately extracting geometric dimensions and orientations, which are also key factors for effective manufacturing
    process planning. This paper presents a novel approach for creating a synthetic CAD dataset that encompasses features
    relevant to both additive and subtractive machining through Python Open Cascade. The Hierarchical Graph Convolutional
    Neural Network (HGCNN) model is implemented to accurately identify the composite additive-subtractive features within
    the synthetic CAD dataset. The key novelty and contribution of the proposed methodology lie in its ability to recognize
    a wide range of manufacturing features, and precisely extracting their dimensions, orientations, and stock sizes. The
    proposed model demonstrates remarkable feature recognition accuracy exceeding 97% and a dimension extraction accuracy
    of 100% for identified features. Therefore, the proposed methodology enhances the integration of CAD, CAPP, and CAM within
    hybrid manufacturing by providing precise feature recognition and dimension extraction. It facilitates improved manufacturing
    process planning, by enabling more informed decision-making.
