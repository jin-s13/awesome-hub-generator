- id: cad2dmd-set-synthetic-generation-tool-of-digital-measuremen-2025
  title: 'CAD2DMD-SET: Synthetic Generation Tool of Digital Measurement Device CAD Model Datasets for fine-tuning Large Vision-Language
    Models'
  abstract: Recent advancements in Large Vision-Language Models (LVLMs) have demonstrated impressive capabilities across various
    multimodal tasks. They continue, however, to struggle with trivial scenarios such as reading values from Digital Measurement
    Devices (DMDs), particularly in real-world conditions involving clutter, occlusions, extreme viewpoints, and motion blur;
    common in head-mounted cameras and Augmented Reality (AR) applications. Motivated by these limitations, this work introduces
    CAD2DMD-SET, a synthetic data generation tool designed to support visual question answering (VQA) tasks involving DMDs.
    By leveraging 3D CAD models, advanced rendering, and high-fidelity image composition, our tool produces diverse, VQA-labelled
    synthetic DMD datasets suitable for fine-tuning LVLMs. Additionally, we present DMDBench, a curated validation set of
    1,000 annotated real-world images designed to evaluate model performance under practical constraints. Benchmarking three
    state-of-the-art LVLMs using Average Normalised Levenshtein Similarity (ANLS) and further fine-tuning LoRA's of these
    models with CAD2DMD-SET's generated dataset yielded substantial improvements, with InternVL showcasing a score increase
    of 200% without degrading on other tasks. This demonstrates that the CAD2DMD-SET training dataset substantially improves
    the robustness and performance of LVLMs when operating under the previously stated challenging conditions. The CAD2DMD-SET
    tool is expected to be released as open-source once the final version of this manuscript is prepared, allowing the community
    to add different measurement devices and generate their own datasets.
