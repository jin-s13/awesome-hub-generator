- id: transfer-learning-in-scalable-graph-neural-network-for-impro-2025
  title: Transfer learning in Scalable Graph Neural Network for Improved Physical Simulation
  abstract: In recent years, Graph Neural Network (GNN) based models have shown promising results in simulating physics of
    complex systems. However, training dedicated graph network based physics simulators can be costly, as most models are
    confined to fully supervised training, which requires extensive data generated from traditional physics simulators. To
    date, how transfer learning could improve the model performance and training efficiency has remained unexplored. In this
    work, we introduce a pre-training and transfer learning paradigm for graph network simulators. We propose the scalable
    graph U-net (SGUNET). Incorporating an innovative depth-first search (DFS) pooling, the SGUNET is adaptable to different
    mesh sizes and resolutions for various simulation tasks. To enable the transfer learning between differently configured
    SGUNETs, we propose a set of mapping functions to align the parameters between the pre-trained model and the target model.
    An extra normalization term is also added into the loss to constrain the difference between the pre-trained weights and
    target model weights for better generalization performance. To pre-train our physics simulator we created a dataset which
    includes 20,000 physical simulations of randomly selected 3D shapes from the open source A Big CAD (ABC) dataset. We show
    that our proposed transfer learning methods allow the model to perform even better when fine-tuned with small amounts
    of training data than when it is trained from scratch with full extensive dataset. On the 2D Deformable Plate benchmark
    dataset, our pre-trained model fine-tuned on 1/16 of the training data achieved an 11.05\% improvement in position RMSE
    compared to the model trained from scratch.
