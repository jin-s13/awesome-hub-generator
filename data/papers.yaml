- id: from-full-and-partial-intraoral-scans-to-crown-proposal-a-c-2026
  title: 'From Full and Partial Intraoral Scans to Crown Proposal: A Classification-Guided Restoration Assistance Pipeline'
  abstract: 'Single-unit crown restoration is among the most common procedures in clinical dentistry, with CAD/CAM workflows
    now designing crowns directly from intraoral scans. Partial scans are often preferred over full-arch scans for single-unit
    cases due to fewer stitching errors, yet most segmentation networks trained on full arches fail on partial scans, while
    end-to-end generative crown methods often produce over-smoothed surfaces that lose occlusal detail. We propose an end-to-end
    pipeline that takes a raw intraoral scan and target FDI tooth number as input and outputs an initial, patient-specific
    crown proposal for clinician refinement. The pipeline has three phases: (I) data preparation and pose standardization;
    (II) segmentation routed by scan type; and (III) crown proposal generation via context-aware retrieval and Blender-based
    fitting. We address partial-scan segmentation through a classify-then-align strategy: a DGCNN classifier categorizes the
    scan into one of five anatomical types, then coarse-to-fine RANSAC+ICP registration standardizes the jaw coordinate frame,
    followed by graph-cut optimization to refine tooth-gingival boundaries. Trained on 1,958 partial scans, the pipeline achieves
    macro-average DSC 0.9249, Recall 0.8919, and Precision 0.9615 across 17 semantic classes; a fine-tuned full-arch model
    reaches DSC 0.9347. The prepared tooth and its mesial and distal neighbors achieve DSC 0.9468-0.9569 with sub-millimeter
    Centroid Errors (0.2666-0.2774 mm). These centroids anchor a retrieval module using DGCNN embeddings and cosine similarity
    over neighboring and opposing teeth, followed by spline-guided alignment and Blender Python API refinement. The pipeline
    produces a preliminary crown shell in 2.5-3.5 minutes, offering a practical alternative to end-to-end generative approaches.'
