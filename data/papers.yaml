- id: cross-domain-image-synthesis-generating-he-from-multiplex-b-2025
  title: 'Cross-Domain Image Synthesis: Generating HE from Multiplex Biomarker Imaging'
  abstract: While multiplex immunofluorescence (mIF) imaging provides deep, spatially-resolved molecular data, integrating
    this information with the morphological standard of Hematoxylin  Eosin (HE) can be very important for obtaining complementary
    information about the underlying tissue. Generating a virtual HE stain from mIF data offers a powerful solution, providing
    immediate morphological context. Crucially, this approach enables the application of the vast ecosystem of HE-based computer-aided
    diagnosis (CAD) tools to analyze rich molecular data, bridging the gap between molecular and morphological analysis. In
    this work, we investigate the use of a multi-level Vector-Quantized Generative Adversarial Network (VQGAN) to create high-fidelity
    virtual HE stains from mIF images. We rigorously evaluated our VQGAN against a standard conditional GAN (cGAN) baseline
    on two publicly available colorectal cancer datasets, assessing performance on both image similarity and functional utility
    for downstream analysis. Our results show that while both architectures produce visually plausible images, the virtual
    stains generated by our VQGAN provide a more effective substrate for computer-aided diagnosis. Specifically, downstream
    nuclei segmentation and semantic preservation in tissue classification tasks performed on VQGAN-generated images demonstrate
    superior performance and agreement with ground-truth analysis compared to those from the cGAN. This work establishes that
    a multi-level VQGAN is a robust and superior architecture for generating scientifically useful virtual stains, offering
    a viable pathway to integrate the rich molecular data of mIF into established and powerful HE-based analytical workflows.
