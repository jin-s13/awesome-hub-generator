- id: deep-learning-based-automated-quantification-of-timi-myocard-2026
  title: 'Deep Learning-Based Automated Quantification of TIMI Myocardial Perfusion Frame Count (DL-TMPFC) from Coronary Angiography:
    A Novel Framework for Rapid Assessment of Microvascular Dysfunction'
  abstract: 'Aims: Coronary microvascular dysfunction (CMVD) affects approximately 40%-60% of patients with ischemia and non-obstructive
    coronary arteries, yet diagnosis remains challenging due to reliance on invasive functional testing or subjective Thrombolysis
    In Myocardial Infarction (TIMI) flow grade. The TIMI Myocardial Perfusion Frame Count (TMPFC) offers an objective, angiography-based
    quantitative measure of CMVD, but its clinical translation is hindered by cumbersome manual calculation and insufficient
    validation. This study aims to develop and validate a deep learning-powered TMPFC calculation (DL-TMPFC), enabling integration
    into clinical workflows. Methods and results: DL-TMPFC framework comprised two components. A stenosis detection network
    first excluded obstructive coronary artery disease (CAD). A territory-aware segmentation network then identified perfusion
    territories and TMPFC calculation module automatically determined the first and last frames from angiographic sequences.
    The framework was validated in a cohort of 655 patients (445 of obstructive CAD, 100 of confirmed CMVD, 110 of control
    group) from three independent institutions. DL-TMPFC showed excellent agreement with expert manual measurements (bias:
    -0.93 frames; 95% LoA: -5.33 to +3.47; r =0.98). DL-TMPFC markedly enhanced clinical feasibility by fully automating TMPFC
    and removing observer dependence. Clinically, DL-TMPFC accurately identified CMVD across a full spectrum of coronary pathologies
    and captured the continuous severity of CMVD beyond binary classification, enabling quantitative risk stratification.
    Conclusion: DL-TMPFC enabled automatic, standardized, and accurate quantification of CMVD directly from routine angiography.
    By providing an automatic and objective measure, this tool provided immediate diagnostic information for timely recognition
    and management of CMVD in clinical practice.'
