- id: tinkerxr-in-situ-reality-aware-cad-and-3d-printing-interfa-2024
  title: 'TinkerXR: In-Situ, Reality-Aware CAD and 3D Printing Interface for Novices'
  abstract: Despite the growing accessibility of augmented reality (AR) for visualization, existing computer-aided design
    (CAD) systems remain confined to traditional screens or require complex setups or predefined parameters, limiting immersion
    and accessibility for novices. We present TinkerXR, an open-source AR interface enabling in-situ design and fabrication
    through Constructive Solid Geometry (CSG) modeling. TinkerXR operates solely with a headset and 3D printer, allowing users
    to design directly in and for their physical environments. By leveraging spatial awareness, depth occlusion, recognition
    of physical constraints, reference objects, and hand movement controls, TinkerXR enhances realism, precision, and ease
    of use. Its AR-based workflow integrates design and 3D printing with a drag-and-drop interface for printers' virtual twins.
    A user study comparing TinkerXR with Tinkercad shows that TinkerXR offers novices higher accessibility, engagement, and
    ease of use. Participants highlighted how designing directly in physical space made the process more intuitive. By bridging
    the gap between digital creation and physical output, TinkerXR aims to transform everyday spaces into expressive creative
    studios. We release TinkerXR as open source to encourage further exploration of accessible, spatially grounded CAD tools.
