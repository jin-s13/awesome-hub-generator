- id: sfd-mamba2net-structure-guided-frequency-enhanced-dual-stre-2025
  title: 'SFD-Mamba2Net: Structure-Guided Frequency-Enhanced Dual-Stream Mamba2 Network for Coronary Artery Segmentation'
  abstract: 'Background: Coronary Artery Disease (CAD) is one of the leading causes of death worldwide. Invasive Coronary
    Angiography (ICA), regarded as the gold standard for CAD diagnosis, necessitates precise vessel segmentation and stenosis
    detection. However, ICA images are typically characterized by low contrast, high noise levels, and complex, fine-grained
    vascular structures, which pose significant challenges to the clinical adoption of existing segmentation and detection
    methods. Objective: This study aims to improve the accuracy of coronary artery segmentation and stenosis detection in
    ICA images by integrating multi-scale structural priors, state-space-based long-range dependency modeling, and frequency-domain
    detail enhancement strategies. Methods: We propose SFD-Mamba2Net, an end-to-end framework tailored for ICA-based vascular
    segmentation and stenosis detection. In the encoder, a Curvature-Aware Structural Enhancement (CASE) module is embedded
    to leverage multi-scale responses for highlighting slender tubular vascular structures, suppressing background interference,
    and directing attention toward vascular regions. In the decoder, we introduce a Progressive High-Frequency Perception
    (PHFP) module that employs multi-level wavelet decomposition to progressively refine high-frequency details while integrating
    low-frequency global structures. Results and Conclusions: SFD-Mamba2Net consistently outperformed state-of-the-art methods
    across eight segmentation metrics, and achieved the highest true positive rate and positive predictive value in stenosis
    detection.'
