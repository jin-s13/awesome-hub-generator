- id: cad-confidence-aware-adaptive-displacement-for-semi-supervi-2025
  title: 'CAD: Confidence-Aware Adaptive Displacement for Semi-Supervised Medical Image Segmentation'
  abstract: Semi-supervised medical image segmentation aims to leverage minimal expert annotations, yet remains confronted
    by challenges in maintaining high-quality consistency learning. Excessive perturbations can degrade alignment and hinder
    precise decision boundaries, especially in regions with uncertain predictions. In this paper, we introduce Confidence-Aware
    Adaptive Displacement (CAD), a framework that selectively identifies and replaces the largest low-confidence regions with
    high-confidence patches. By dynamically adjusting both the maximum allowable replacement size and the confidence threshold
    throughout training, CAD progressively refines the segmentation quality without overwhelming the learning process. Experimental
    results on public medical datasets demonstrate that CAD effectively enhances segmentation quality, establishing new state-of-the-art
    accuracy in this field. The source code will be released after the paper is published.
