- id: impact-of-fasteners-on-the-radar-cross-section-performance-o-2025
  title: Impact of Fasteners on the Radar Cross-Section performance of Radar Absorbing Air Intake Duct
  abstract: An aircraft consists of various cavities including air intake ducts, cockpit, radome, inlet and exhaust of heat
    exchangers, passage for engine bay/other bay cooling etc. These cavities are prime radar cross-section (RCS) contributors
    of aircraft. The major such cavity is air intake duct, and it contributes significantly to frontal sector RCS of an aircraft.
    The RCS reductions of air intake duct is very important to achieve a low RCS (or stealthy) aircraft configuration. In
    general, radar absorbing materials (RAM) are getting utilized for RCS reduction of air intake duct. It can also be noticed
    that a large number of fasteners are used for integration of air intake duct with the aircraft structures. The installation
    of fasteners on RAS may lead to degradation of RCS performance of air intake. However, no such studies are reported in
    the literature on the impact of rivets on the RCS performance of RAS air intake duct. In this paper, radar absorbing material
    of thickness 6.25 mm is designed which givens more than -10 dB reflection loss from 4 to 18GHz of frequencies. Next, the
    effect of rivet installation on these RAS is carried out using three different rivet configurations. The RCS performance
    of RAS is evaluated for duct of different lengths from 1 to 18GHz of frequencies. In order to see the RCS performance,
    five different air intake cases are considered The RCS performance with increase in percentage surface area of rivet heads
    to RAS is reported in detail. At the last, an open-source aircraft CAD model is considered and the RCS performance of
    RAS air intake with and without rivets is evaluated.
