- id: skeyspot-automating-service-key-detection-for-digital-elect-2025
  title: 'SkeySpot: Automating Service Key Detection for Digital Electrical Layout Plans in the Construction Industry'
  abstract: Legacy floor plans, often preserved only as scanned documents, remain essential resources for architecture, urban
    planning, and facility management in the construction industry. However, the lack of machine-readable floor plans render
    large-scale interpretation both time-consuming and error-prone. Automated symbol spotting offers a scalable solution by
    enabling the identification of service key symbols directly from floor plans, supporting workflows such as cost estimation,
    infrastructure maintenance, and regulatory compliance. This work introduces a labelled Digitised Electrical Layout Plans
    (DELP) dataset comprising 45 scanned electrical layout plans annotated with 2,450 instances across 34 distinct service
    key classes. A systematic evaluation framework is proposed using pretrained object detection models for DELP dataset.
    Among the models benchmarked, YOLOv8 achieves the highest performance with a mean Average Precision (mAP) of 82.5\%. Using
    YOLOv8, we develop SkeySpot, a lightweight, open-source toolkit for real-time detection, classification, and quantification
    of electrical symbols. SkeySpot produces structured, standardised outputs that can be scaled up for interoperable building
    information workflows, ultimately enabling compatibility across downstream applications and regulatory platforms. By lowering
    dependency on proprietary CAD systems and reducing manual annotation effort, this approach makes the digitisation of electrical
    layouts more accessible to small and medium-sized enterprises (SMEs) in the construction industry, while supporting broader
    goals of standardisation, interoperability, and sustainability in the built environment.
