- id: cad-gpt-synthesising-cad-construction-sequence-with-spatial-2024
  title: 'CAD-GPT: Synthesising CAD Construction Sequence with Spatial Reasoning-Enhanced Multimodal LLMs'
  abstract: Computer-aided design (CAD) significantly enhances the efficiency, accuracy, and innovation of design processes
    by enabling precise 2D and 3D modeling, extensive analysis, and optimization. Existing methods for creating CAD models
    rely on latent vectors or point clouds, which are difficult to obtain, and storage costs are substantial. Recent advances
    in Multimodal Large Language Models (MLLMs) have inspired researchers to use natural language instructions and images
    for CAD model construction. However, these models still struggle with inferring accurate 3D spatial location and orientation,
    leading to inaccuracies in determining the spatial 3D starting points and extrusion directions for constructing geometries.
    This work introduces CAD-GPT, a CAD synthesis method with spatial reasoning-enhanced MLLM that takes either a single image
    or a textual description as input. To achieve precise spatial inference, our approach introduces a 3D Modeling Spatial
    Mechanism. This method maps 3D spatial positions and 3D sketch plane rotation angles into a 1D linguistic feature space
    using a specialized spatial unfolding mechanism, while discretizing 2D sketch coordinates into an appropriate planar space
    to enable precise determination of spatial starting position, sketch orientation, and 2D sketch coordinate translations.
    Extensive experiments demonstrate that CAD-GPT consistently outperforms existing state-of-the-art methods in CAD model
    synthesis, both quantitatively and qualitatively.
