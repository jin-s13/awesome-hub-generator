- id: ad-lite-net-a-lightweight-and-concatenated-cnn-model-for-al-2024
  title: 'AD-Lite Net: A Lightweight and Concatenated CNN Model for Alzheimer''s Detection from MRI Images'
  abstract: Alzheimer's Disease (AD) is a non-curable progressive neurodegenerative disorder that affects the human brain,
    leading to a decline in memory, cognitive abilities, and eventually, the ability to carry out daily tasks. Manual diagnosis
    of Alzheimer's disease from MRI images is fraught with less sensitivity and it is a very tedious process for neurologists.
    Therefore, there is a need for an automatic Computer Assisted Diagnosis (CAD) system, which can detect AD at early stages
    with higher accuracy. In this research, we have proposed a novel AD-Lite Net model (trained from scratch), that could
    alleviate the aforementioned problem. The novelties we bring here in this research are, (I) We have proposed a very lightweight
    CNN model by incorporating Depth Wise Separable Convolutional (DWSC) layers and Global Average Pooling (GAP) layers. (II)
    We have leveraged a ``parallel concatenation block'' (pcb), in the proposed AD-Lite Net model. This pcb consists of a
    Transformation layer (Tx-layer), followed by two convolutional layers, which are thereby concatenated with the original
    base model. This Tx-layer converts the features into very distinct kind of features, which are imperative for the Alzheimer's
    disease. As a consequence, the proposed AD-Lite Net model with ``parallel concatenation'' converges faster and automatically
    mitigates the class imbalance problem from the MRI datasets in a very generalized way. For the validity of our proposed
    model, we have implemented it on three different MRI datasets. Furthermore, we have combined the ADNI and AD datasets
    and subsequently performed a 10-fold cross-validation experiment to verify the model's generalization ability. Extensive
    experimental results showed that our proposed model has outperformed all the existing CNN models, and one recent trend
    Vision Transformer (ViT) model by a significant margin.
