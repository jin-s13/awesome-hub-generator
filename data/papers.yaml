- id: promrvl-cad-proactive-dialogue-system-with-multi-round-visi-2025
  title: 'ProMRVL-CAD: Proactive Dialogue System with Multi-Round Vision-Language Interactions for Computer-Aided Diagnosis'
  abstract: 'Recent advancements in large language models (LLMs) have demonstrated extraordinary comprehension capabilities
    with remarkable breakthroughs on various vision-language tasks. However, the application of LLMs in generating reliable
    medical diagnostic reports remains in the early stages. Currently, medical LLMs typically feature a passive interaction
    model where doctors respond to patient queries with little or no involvement in analyzing medical images. In contrast,
    some ChatBots simply respond to predefined queries based on visual inputs, lacking interactive dialogue or consideration
    of medical history. As such, there is a gap between LLM-generated patient-ChatBot interactions and those occurring in
    actual patient-doctor consultations. To bridge this gap, we develop an LLM-based dialogue system, namely proactive multi-round
    vision-language interactions for computer-aided diagnosis (ProMRVL-CAD), to generate patient-friendly disease diagnostic
    reports. The proposed ProMRVL-CAD system allows proactive dialogue to provide patients with constant and reliable medical
    access via an integration of knowledge graph into a recommendation system. Specifically, we devise two generators: a Proactive
    Question Generator (Pro-Q Gen) to generate proactive questions that guide the diagnostic procedure and a Multi-Vision
    Patient-Text Diagnostic Report Generator (MVP-DR Gen) to produce high-quality diagnostic reports. Evaluating two real-world
    publicly available datasets, MIMIC-CXR and IU-Xray, our model has better quality in generating medical reports. We further
    demonstrate the performance of ProMRVL achieves robust under the scenarios with low image quality. Moreover, we have created
    a synthetic medical dialogue dataset that simulates proactive diagnostic interactions between patients and doctors, serving
    as a valuable resource for training LLM.'
