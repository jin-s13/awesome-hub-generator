- id: category-level-6d-object-pose-estimation-in-agricultural-set-2025
  title: Category-Level 6D Object Pose Estimation in Agricultural Settings Using a Lattice-Deformation Framework and Diffusion-Augmented
    Synthetic Data
  abstract: Accurate 6D object pose estimation is essential for robotic grasping and manipulation, particularly in agriculture,
    where fruits and vegetables exhibit high intra-class variability in shape, size, and texture. The vast majority of existing
    methods rely on instance-specific CAD models or require depth sensors to resolve geometric ambiguities, making them impractical
    for real-world agricultural applications. In this work, we introduce PLANTPose, a novel framework for category-level 6D
    pose estimation that operates purely on RGB input. PLANTPose predicts both the 6D pose and deformation parameters relative
    to a base mesh, allowing a single category-level CAD model to adapt to unseen instances. This enables accurate pose estimation
    across varying shapes without relying on instance-specific data. To enhance realism and improve generalization, we also
    leverage Stable Diffusion to refine synthetic training images with realistic texturing, mimicking variations due to ripeness
    and environmental factors and bridging the domain gap between synthetic data and the real world. Our evaluations on a
    challenging benchmark that includes bananas of various shapes, sizes, and ripeness status demonstrate the effectiveness
    of our framework in handling large intraclass variations while maintaining accurate 6D pose predictions, significantly
    outperforming the state-of-the-art RGB-based approach MegaPose.
