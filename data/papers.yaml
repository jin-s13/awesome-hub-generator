- id: drive-through-3d-vehicle-exterior-reconstruction-via-dynamic-2026
  title: Drive-Through 3D Vehicle Exterior Reconstruction via Dynamic-Scene SfM and Distortion-Aware Gaussian Splatting
  abstract: High-fidelity 3D reconstruction of vehicle exteriors improves buyer confidence in online automotive marketplaces,
    but generating these models in cluttered dealership drive-throughs presents severe technical challenges. Unlike static-scene
    photogrammetry, this setting features a dynamic vehicle moving against heavily cluttered, static backgrounds. This problem
    is further compounded by wide-angle lens distortion, specular automotive paint, and non-rigid wheel rotations that violate
    classical epipolar constraints. We propose an end-to-end pipeline utilizing a two-pillar camera rig. First, we resolve
    dynamic-scene ambiguities by coupling SAM 3 for instance segmentation with motion-gating to cleanly isolate the moving
    vehicle, explicitly masking out non-rigid wheels to enforce strict epipolar geometry. Second, we extract robust correspondences
    directly on raw, distorted 4K imagery using the RoMa v2 learned matcher guided by semantic confidence masks. Third, these
    matches are integrated into a rig-aware SfM optimization that utilizes CAD-derived relative pose priors to eliminate scale
    drift. Finally, we use a distortion-aware 3D Gaussian Splatting framework (3DGUT) coupled with a stochastic Markov Chain
    Monte Carlo (MCMC) densification strategy to render reflective surfaces. Evaluations on 25 real-world vehicles across
    10 dealerships demonstrate that our full pipeline achieves a PSNR of 28.66 dB, an SSIM of 0.89, and an LPIPS of 0.21 on
    held-out views, representing a 3.85 dB improvement over standard 3D-GS, delivering inspection-grade interactive 3D models
    without controlled studio infrastructure.
