- id: a-comprehensive-comparison-of-deep-learning-architectures-fo-2026
  title: A Comprehensive Comparison of Deep Learning Architectures for COVID-19 Classification on CT  X-ray Imagery
  abstract: COVID-19 was a significant challenge that led to the loss of numerous lives daily. Not only a certain country
    was involved in this outbreak, but even the world has suffered because of the coronavirus. Imaging techniques using computed
    tomography (CT) and X-rays of the lungs are the most useful tools for the COVID-19 or any other pandemic disease screening
    process. Technology today has revolutionized the world by using artificial intelligence to replace manual processes with
    automated machines, which enable the system to imitate the human brain by making wise decisions based on experience. Motivated
    by this, our work proposes to use convolutional neural networks (CNN) based models for designing a computer-aided diagnosis
    (CAD) system that differentiates between COVID-19 and healthy lung pictures. We used two different sets of X-ray images
    of the lungs in addition to two different sets of CT scans and the classification is done using a variety of networks
    that have been pre-trained such as VGG (16, 19), Densenet (121), Resnet (50, 50 V2, 101 V2), Mobile net (V2), Xception
    Inception (V3, Resnet V2), Efficient net (B0) and Nasnet (Large). On the X-ray and CT image datasets, Resnet and VGG architecture
    have shown the ability to properly differentiate COVID-19 from normal images, with an average accuracy of 95 to 98 percent
    respectively. Our acquired results on the classification datasets are competitive and superior to previously reported
    findings in the literature.
