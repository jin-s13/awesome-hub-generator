- id: oscar-open-set-cad-retrieval-from-a-language-prompt-and-a-s-2026
  title: 'OSCAR: Open-Set CAD Retrieval from a Language Prompt and a Single Image'
  abstract: '6D object pose estimation plays a crucial role in scene understanding for applications such as robotics and augmented
    reality. To support the needs of ever-changing object sets in such context, modern zero-shot object pose estimators were
    developed to not require object-specific training but only rely on CAD models. Such models are hard to obtain once deployed,
    and a continuously changing and growing set of objects makes it harder to reliably identify the instance model of interest.
    To address this challenge, we introduce an Open-Set CAD Retrieval from a Language Prompt and a Single Image (OSCAR), a
    novel training-free method that retrieves a matching object model from an unlabeled 3D object database. During onboarding,
    OSCAR generates multi-view renderings of database models and annotates them with descriptive captions using an image captioning
    model. At inference, GroundedSAM detects the queried object in the input image, and multi-modal embeddings are computed
    for both the Region-of-Interest and the database captions. OSCAR employs a two-stage retrieval: text-based filtering using
    CLIP identifies candidate models, followed by image-based refinement using DINOv2 to select the most visually similar
    object. In our experiments we demonstrate that OSCAR outperforms all state-of-the-art methods on the cross-domain 3D model
    retrieval benchmark MI3DOR. Furthermore, we demonstrate OSCAR''s direct applicability in automating object model sourcing
    for 6D object pose estimation. We propose using the most similar object model for pose estimation if the exact instance
    is not available and show that OSCAR achieves an average precision of 90.48\% during object retrieval on the YCB-V object
    dataset. Moreover, we demonstrate that the most similar object model can be utilized for pose estimation using Megapose
    achieving better results than a reconstruction-based approach.'
