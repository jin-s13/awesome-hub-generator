- id: urbancad-towards-highly-controllable-and-photorealistic-3d-2024
  title: 'UrbanCAD: Towards Highly Controllable and Photorealistic 3D Vehicles for Urban Scene Simulation'
  abstract: Photorealistic 3D vehicle models with high controllability are essential for autonomous driving simulation and
    data augmentation. While handcrafted CAD models provide flexible controllability, free CAD libraries often lack the high-quality
    materials necessary for photorealistic rendering. Conversely, reconstructed 3D models offer high-fidelity rendering but
    lack controllability. In this work, we introduce UrbanCAD, a framework that generates highly controllable and photorealistic
    3D vehicle digital twins from a single urban image, leveraging a large collection of free 3D CAD models and handcrafted
    materials. To achieve this, we propose a novel pipeline that follows a retrieval-optimization manner, adapting to observational
    data while preserving fine-grained expert-designed priors for both geometry and material. This enables vehicles' realistic
    360-degree rendering, background insertion, material transfer, relighting, and component manipulation. Furthermore, given
    multi-view background perspective and fisheye images, we approximate environment lighting using fisheye images and reconstruct
    the background with 3DGS, enabling the photorealistic insertion of optimized CAD models into rendered novel view backgrounds.
    Experimental results demonstrate that UrbanCAD outperforms baselines in terms of photorealism. Additionally, we show that
    various perception models maintain their accuracy when evaluated on UrbanCAD with in-distribution configurations but degrade
    when applied to realistic out-of-distribution data generated by our method. This suggests that UrbanCAD is a significant
    advancement in creating photorealistic, safety-critical driving scenarios for downstream applications.
