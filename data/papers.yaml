- id: filletrec-a-lightweight-graph-neural-network-with-intrinsic-2025
  title: 'FilletRec: A Lightweight Graph Neural Network with Intrinsic Features for Automated Fillet Recognition'
  abstract: Automated recognition and simplification of fillet features in CAD models is critical for CAE analysis, yet it
    remains an open challenge. Traditional rule-based methods lack robustness, while existing deep learning models suffer
    from poor generalization and low accuracy on complex fillets due to their generic design and inadequate training data.
    To address these issues, this paper proposes an end-to-end, data-driven framework specifically for fillet features. We
    first construct and release a large-scale, diverse benchmark dataset for fillet recognition to address the inadequacy
    of existing data. Based on it, we propose FilletRec, a lightweight graph neural network. The core innovation of this network
    is its use of pose-invariant intrinsic geometric features, such as curvature, enabling it to learn more fundamental geometric
    patterns and thereby achieve high-precision recognition of complex geometric topologies. Experiments show that FilletRec
    surpasses state-of-the-art methods in both accuracy and generalization, while using only 0.2\%-5.4\% of the parameters
    of baseline models, demonstrating high model efficiency. Finally, the framework completes the automated workflow from
    recognition to simplification by integrating an effective geometric simplification algorithm.
