- id: multidiffsense-diffusion-based-multi-modal-visuo-tactile-im-2026
  title: 'MultiDiffSense: Diffusion-Based Multi-Modal Visuo-Tactile Image Generation Conditioned on Object Shape and Contact
    Pose'
  abstract: Acquiring aligned visuo-tactile datasets is slow and costly, requiring specialised hardware and large-scale data
    collection. Synthetic generation is promising, but prior methods are typically single-modality, limiting cross-modal learning.
    We present MultiDiffSense, a unified diffusion model that synthesises images for multiple vision-based tactile sensors
    (ViTac, TacTip, ViTacTip) within a single architecture. Our approach uses dual conditioning on CAD-derived, pose-aligned
    depth maps and structured prompts that encode sensor type and 4-DoF contact pose, enabling controllable, physically consistent
    multi-modal synthesis. Evaluating on 8 objects (5 seen, 3 novel) and unseen poses, MultiDiffSense outperforms a Pix2Pix
    cGAN baseline in SSIM by +36.3% (ViTac), +134.6% (ViTacTip), and +64.7% (TacTip). For downstream 3-DoF pose estimation,
    mixing 50% synthetic with 50% real halves the required real data while maintaining competitive performance. MultiDiffSense
    alleviates the data-collection bottleneck in tactile sensing and enables scalable, controllable multi-modal dataset generation
    for robotic applications.
