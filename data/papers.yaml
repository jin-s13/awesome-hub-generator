- id: computation-efficient-and-recognition-friendly-3d-point-clou-2025
  title: Computation-Efficient and Recognition-Friendly 3D Point Cloud Privacy Protection
  abstract: 3D point cloud has been widely used in applications such as self-driving cars, robotics, CAD models, etc. To the
    best of our knowledge, these applications raised the issue of privacy leakage in 3D point clouds, which has not been studied
    well. Different from the 2D image privacy, which is related to texture and 2D geometric structure, the 3D point cloud
    is texture-less and only relevant to 3D geometric structure. In this work, we defined the 3D point cloud privacy problem
    and proposed an efficient privacy-preserving framework named PointFlowGMM that can support downstream classification and
    segmentation tasks without seeing the original data. Using a flow-based generative model, the point cloud is projected
    into a latent Gaussian mixture distributed subspace. We further designed a novel angular similarity loss to obfuscate
    the original geometric structure and reduce the model size from 767MB to 120MB without a decrease in recognition performance.
    The projected point cloud in the latent space is orthogonally rotated randomly to further protect the original geometric
    structure, the class-to-class relationship is preserved after rotation, thus, the protected point cloud can support the
    recognition task. We evaluated our model on multiple datasets and achieved comparable recognition results on encrypted
    point clouds compared to the original point clouds.
