- id: human-in-the-loop-quantitative-evaluation-of-3d-models-gene-2025
  title: 'Human-in-the-Loop: Quantitative Evaluation of 3D Models Generation by Large Language Models'
  abstract: 'Large Language Models are increasingly capable of interpreting multimodal inputs to generate complex 3D shapes,
    yet robust methods to evaluate geometric and structural fidelity remain underdeveloped. This paper introduces a human
    in the loop framework for the quantitative evaluation of LLM generated 3D models, supporting applications such as democratization
    of CAD design, reverse engineering of legacy designs, and rapid prototyping. We propose a comprehensive suite of similarity
    and complexity metrics, including volumetric accuracy, surface alignment, dimensional fidelity, and topological intricacy,
    to benchmark generated models against ground truth CAD references. Using an L bracket component as a case study, we systematically
    compare LLM performance across four input modalities: 2D orthographic views, isometric sketches, geometric structure trees,
    and code based correction prompts. Our findings demonstrate improved generation fidelity with increased semantic richness,
    with code level prompts achieving perfect reconstruction across all metrics. A key contribution of this work is demonstrating
    that our proposed quantitative evaluation approach enables significantly faster convergence toward the ground truth, especially
    compared to traditional qualitative methods based solely on visual inspection and human intuition. This work not only
    advances the understanding of AI assisted shape synthesis but also provides a scalable methodology to validate and refine
    generative models for diverse CAD applications.'
