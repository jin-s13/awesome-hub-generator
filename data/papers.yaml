- id: cadic-continual-anomaly-detection-based-on-incremental-core-2025
  title: 'CADIC: Continual Anomaly Detection Based on Incremental Coreset'
  abstract: The primary objective of Continual Anomaly Detection (CAD) is to learn the normal patterns of new tasks under
    dynamic data distribution assumptions while mitigating catastrophic forgetting. Existing embedding-based CAD approaches
    continuously update a memory bank with new embeddings to adapt to sequential tasks. However, these methods require constructing
    class-specific sub-memory banks for each task, which restricts their flexibility and scalability. To address this limitation,
    we propose a novel CAD framework where all tasks share a unified memory bank. During training, the method incrementally
    updates embeddings within a fixed-size coreset, enabling continuous knowledge acquisition from sequential tasks without
    task-specific memory fragmentation. In the inference phase, anomaly scores are computed via a nearest-neighbor matching
    mechanism, achieving state-of-the-art detection accuracy. We validate the method through comprehensive experiments on
    MVTec AD and Visa datasets. Results show that our approach outperforms existing baselines, achieving average image-level
    AUROC scores of 0.972 (MVTec AD) and 0.891 (Visa). Notably, on a real-world electronic paper dataset, it demonstrates
    100% accuracy in anomaly sample detection, confirming its robustness in practical scenarios. The implementation will be
    open-sourced on GitHub.
