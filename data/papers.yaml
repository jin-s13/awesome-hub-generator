- id: black-box-adversarial-attack-on-vision-language-models-for-a-2025
  title: Black-Box Adversarial Attack on Vision Language Models for Autonomous Driving
  abstract: 'Vision-language models (VLMs) have significantly advanced autonomous driving (AD) by enhancing reasoning capabilities;
    however, these models remain highly susceptible to adversarial attacks. While existing research has explored white-box
    attacks to some extent, the more practical and challenging black-box scenarios remain largely underexplored due to their
    inherent difficulty. In this paper, we take the first step toward designing black-box adversarial attacks specifically
    targeting VLMs in AD. We identify two key challenges for achieving effective black-box attacks in this context: the effectiveness
    across driving reasoning chains in AD systems and the dynamic nature of driving scenarios. To address this, we propose
    Cascading Adversarial Disruption (CAD). It first introduces Decision Chain Disruption, which targets low-level reasoning
    breakdown by generating and injecting deceptive semantics, ensuring the perturbations remain effective across the entire
    decision-making chain. Building on this, we present Risky Scene Induction, which addresses dynamic adaptation by leveraging
    a surrogate VLM to understand and construct high-level risky scenarios that are likely to result in critical errors in
    the current driving contexts. Extensive experiments conducted on multiple AD VLMs and benchmarks demonstrate that CAD
    achieves state-of-the-art attack effectiveness, significantly outperforming existing methods (+13.43% on average). Moreover,
    we validate its practical applicability through real-world attacks on AD vehicles powered by VLMs, where the route completion
    rate drops by 61.11% and the vehicle crashes directly into the obstacle vehicle with adversarial patches. Finally, we
    release CADA dataset, comprising 18,808 adversarial visual-question-answer pairs, to facilitate further evaluation and
    research in this critical domain. Our codes and dataset will be available after paper''s acceptance.'
