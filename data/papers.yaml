- id: attention-is-also-needed-for-form-design-2025
  title: Attention is also needed for form design
  abstract: 'Conventional product design is a cognitively demanding process, limited by its time-consuming nature, reliance
    on subjective expertise, and the opaque translation of inspiration into tangible concepts. This research introduces a
    novel, attention-aware framework that integrates two synergistic systems: EUPHORIA, an immersive Virtual Reality environment
    using eye-tracking to implicitly capture a designer''s aesthetic preferences, and RETINA, an agentic AI pipeline that
    translates these implicit preferences into concrete design outputs. The foundational principles were validated in a two-part
    study. An initial study correlated user''s implicit attention with explicit preference and the next one correlated mood
    to attention. A comparative study where 4 designers solved challenging design problems using 4 distinct workflows, from
    a manual process to an end-to-end automated pipeline, showed the integrated EUPHORIA-RETINA workflow was over 4 times
    more time-efficient than the conventional method. A panel of 50 design experts evaluated the 16 final renderings. Designs
    generated by the fully automated system consistently received the highest Worthiness (calculated by an inverse Plackett-Luce
    model based on gradient descent optimization) and Design Effectiveness scores, indicating superior quality across 8 criteria:
    novelty, visual appeal, emotional resonance, clarity of purpose, distinctiveness of silhouette, implied materiality, proportional
    balance,  adherence to the brief. This research presents a validated paradigm shift from traditional Computer-Assisted
    Design (CAD) to a collaborative model of Designer-Assisting Computers (DAC). By automating logistical and skill-dependent
    generative tasks, the proposed framework elevates the designer''s role to that of a creative director, synergizing human
    intuition with the generative power of agentic AI to produce higher-quality designs more efficiently.'
