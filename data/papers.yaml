- id: waldo-where-unseen-model-based-6d-pose-estimation-meets-occ-2025
  title: 'WALDO: Where Unseen Model-based 6D Pose Estimation Meets Occlusion'
  abstract: 'Accurate 6D object pose estimation is vital for robotics, augmented reality, and scene understanding. For seen
    objects, high accuracy is often attainable via per-object fine-tuning but generalizing to unseen objects remains a challenge.
    To address this problem, past arts assume access to CAD models at test time and typically follow a multi-stage pipeline
    to estimate poses: detect and segment the object, propose an initial pose, and then refine it. Under occlusion, however,
    the early-stage of such pipelines are prone to errors, which can propagate through the sequential processing, and consequently
    degrade the performance. To remedy this shortcoming, we propose four novel extensions to model-based 6D pose estimation
    methods: (i) a dynamic non-uniform dense sampling strategy that focuses computation on visible regions, reducing occlusion-induced
    errors; (ii) a multi-hypothesis inference mechanism that retains several confidence-ranked pose candidates, mitigating
    brittle single-path failures; (iii) iterative refinement to progressively improve pose accuracy; and (iv) series of occlusion-focused
    training augmentations that strengthen robustness and generalization. Furthermore, we propose a new weighted by visibility
    metric for evaluation under occlusion to minimize the bias in the existing protocols. Via extensive empirical evaluations,
    we show that our proposed approach achieves more than 5% improvement in accuracy on ICBIN and more than 2% on BOP dataset
    benchmarks, while achieving approximately 3 times faster inference.'
