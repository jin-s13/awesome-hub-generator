- id: 6d-object-pose-tracking-in-internet-videos-for-robotic-manip-2025
  title: 6D Object Pose Tracking in Internet Videos for Robotic Manipulation
  abstract: We seek to extract a temporally consistent 6D pose trajectory of a manipulated object from an Internet instructional
    video. This is a challenging set-up for current 6D pose estimation methods due to uncontrolled capturing conditions, subtle
    but dynamic object motions, and the fact that the exact mesh of the manipulated object is not known. To address these
    challenges, we present the following contributions. First, we develop a new method that estimates the 6D pose of any object
    in the input image without prior knowledge of the object itself. The method proceeds by (i) retrieving a CAD model similar
    to the depicted object from a large-scale model database, (ii) 6D aligning the retrieved CAD model with the input image,
    and (iii) grounding the absolute scale of the object with respect to the scene. Second, we extract smooth 6D object trajectories
    from Internet videos by carefully tracking the detected objects across video frames. The extracted object trajectories
    are then retargeted via trajectory optimization into the configuration space of a robotic manipulator. Third, we thoroughly
    evaluate and ablate our 6D pose estimation method on YCB-V and HOPE-Video datasets as well as a new dataset of instructional
    videos manually annotated with approximate 6D object trajectories. We demonstrate significant improvements over existing
    state-of-the-art RGB 6D pose estimation methods. Finally, we show that the 6D object motion estimated from Internet videos
    can be transferred to a 7-axis robotic manipulator both in a virtual simulator as well as in a real world set-up. We also
    successfully apply our method to egocentric videos taken from the EPIC-KITCHENS dataset, demonstrating potential for Embodied
    AI applications.
