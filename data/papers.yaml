- id: cad-judge-toward-efficient-morphological-grading-and-verifi-2025
  title: 'CAD-Judge: Toward Efficient Morphological Grading and Verification for Text-to-CAD Generation'
  abstract: Computer-Aided Design (CAD) models are widely used across industrial design, simulation, and manufacturing processes.
    Text-to-CAD systems aim to generate editable, general-purpose CAD models from textual descriptions, significantly reducing
    the complexity and entry barrier associated with traditional CAD workflows. However, rendering CAD models can be slow,
    and deploying VLMs to review CAD models can be expensive and may introduce reward hacking that degrades the systems. To
    address these challenges, we propose CAD-Judge, a novel, verifiable reward system for efficient and effective CAD preference
    grading and grammatical validation. We adopt the Compiler-as-a-Judge Module (CJM) as a fast, direct reward signal, optimizing
    model alignment by maximizing generative utility through prospect theory. To further improve the robustness of Text-to-CAD
    in the testing phase, we introduce a simple yet effective agentic CAD generation approach and adopt the Compiler-as-a-Review
    Module (CRM), which efficiently verifies the generated CAD models, enabling the system to refine them accordingly. Extensive
    experiments on challenging CAD datasets demonstrate that our method achieves state-of-the-art performance while maintaining
    superior efficiency.
