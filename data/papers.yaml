- id: partuv-part-based-uv-unwrapping-of-3d-meshes-2025
  title: 'PartUV: Part-Based UV Unwrapping of 3D Meshes'
  abstract: UV unwrapping flattens 3D surfaces to 2D with minimal distortion, often requiring the complex surface to be decomposed
    into multiple charts. Although extensively studied, existing UV unwrapping methods frequently struggle with AI-generated
    meshes, which are typically noisy, bumpy, and poorly conditioned. These methods often produce highly fragmented charts
    and suboptimal boundaries, introducing artifacts and hindering downstream tasks. We introduce PartUV, a part-based UV
    unwrapping pipeline that generates significantly fewer, part-aligned charts while maintaining low distortion. Built on
    top of a recent learning-based part decomposition method PartField, PartUV combines high-level semantic part decomposition
    with novel geometric heuristics in a top-down recursive framework. It ensures each chart's distortion remains below a
    user-specified threshold while minimizing the total number of charts. The pipeline integrates and extends parameterization
    and packing algorithms, incorporates dedicated handling of non-manifold and degenerate meshes, and is extensively parallelized
    for efficiency. Evaluated across four diverse datasets, including man-made, CAD, AI-generated, and Common Shapes, PartUV
    outperforms existing tools and recent neural methods in chart count and seam length, achieves comparable distortion, exhibits
    high success rates on challenging meshes, and enables new applications like part-specific multi-tiles packing. Our project
    page is at https://www.zhaoningwang.com/PartUV.
