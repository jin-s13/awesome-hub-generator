- id: bcdnet-a-fast-residual-neural-network-for-invasive-ductal-c-2024
  title: 'BCDNet: A Fast Residual Neural Network For Invasive Ductal Carcinoma Detection'
  abstract: It is of great significance to diagnose Invasive Ductal Carcinoma (IDC) in early stage, which is the most common
    subtype of breast cancer. Although the powerful models in the Computer-Aided Diagnosis (CAD) systems provide promising
    results, it is still difficult to integrate them into other medical devices or use them without sufficient computation
    resource. In this paper, we propose BCDNet, which firstly upsamples the input image by the residual block and use smaller
    convolutional block and a special MLP to learn features. BCDNet is proofed to effectively detect IDC in histopathological
    RGB images with an average accuracy of 91.6% and reduce training consumption effectively compared to ResNet 50 and ViT-B-16.
