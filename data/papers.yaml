- id: periodet-large-scale-panoramic-radiograph-benchmark-for-cli-2025
  title: 'PerioDet: Large-Scale Panoramic Radiograph Benchmark for Clinical-Oriented Apical Periodontitis Detection'
  abstract: Apical periodontitis is a prevalent oral pathology that presents significant public health challenges. Despite
    advances in automated diagnostic systems across various medical fields, the development of Computer-Aided Diagnosis (CAD)
    applications for apical periodontitis is still constrained by the lack of a large-scale, high-quality annotated dataset.
    To address this issue, we release a large-scale panoramic radiograph benchmark called "PerioXrays", comprising 3,673 images
    and 5,662 meticulously annotated instances of apical periodontitis. To the best of our knowledge, this is the first benchmark
    dataset for automated apical periodontitis diagnosis. This paper further proposes a clinical-oriented apical periodontitis
    detection (PerioDet) paradigm, which jointly incorporates Background-Denoising Attention (BDA) and IoU-Dynamic Calibration
    (IDC) mechanisms to address the challenges posed by background noise and small targets in automated detection. Extensive
    experiments on the PerioXrays dataset demonstrate the superiority of PerioDet in advancing automated apical periodontitis
    detection. Additionally, a well-designed human-computer collaborative experiment underscores the clinical applicability
    of our method as an auxiliary diagnostic tool for professional dentists.
