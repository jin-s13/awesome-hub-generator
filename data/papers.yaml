- id: broncholumen-analysis-of-recent-yolo-based-architectures-fo-2026
  title: 'BronchoLumen: Analysis of recent YOLO-based architectures for real-time bronchial orifice detection in video bronchoscopy'
  abstract: Bronchoscopy is routinely conducted in pulmonary clinics and intensive care units, but navigating the complex
    branching of the respiratory tract remains challenging. This paper introduces BronchoLumen, a real-time YOLO-based system
    for detecting bronchial orifices in video bronchoscopy, aiming to assist navigation and CAD systems. The paper investigates
    if bronchial orifices can be robustly detected across image domains using state-of-the-art object detection and a limited
    set of public image data. The study includes the description and comparison of YOLOv8, a widely adopted architecture,
    and YOLOv12, a more recent architecture integrating attention-based modules to improve spatial reasoning. Both models
    are trained and tested solely on publicly available datasets comprising different image domains. A comparison of both
    models is conducted based on the common metrics mAP@0.5 and mAP@0.5:0.9 with the latter emphasizing localization accuracy.
    For YOLOv8 we obtained a mAP@0.5 of 0.91 on an in-domain and 0.68 on a cross-domain test set. YOLOv12 achieved 0.84 and
    0.68 respectively with slightly better localization accuracy with mAP@0.5:0.9 of 0.48 and 0.26 compared to YOLOv8 with
    0.45 and 0.25. Challenges like motion blur and low contrast occasionally entailed uncertainties but the system demonstrated
    overall robustness in most scenarios. BronchoLumen is an open-weight, YOLO-based solution for bronchial orifice detection
    offering high accuracy and efficiency across multiple image domains. While the more recent YOLOv12 achieves better localization
    accuracy, we observed a slightly worse precision. The models have been made publicly available to foster further research
    in bronchoscopy navigation.
