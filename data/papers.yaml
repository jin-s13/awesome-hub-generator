- id: adverx-ray-ensuring-x-ray-integrity-through-frequency-sensi-2025
  title: 'AdverX-Ray: Ensuring X-Ray Integrity Through Frequency-Sensitive Adversarial VAEs'
  abstract: Ensuring the quality and integrity of medical images is crucial for maintaining diagnostic accuracy in deep learning-based
    Computer-Aided Diagnosis and Computer-Aided Detection (CAD) systems. Covariate shifts are subtle variations in the data
    distribution caused by different imaging devices or settings and can severely degrade model performance, similar to the
    effects of adversarial attacks. Therefore, it is vital to have a lightweight and fast method to assess the quality of
    these images prior to using CAD models. AdverX-Ray addresses this need by serving as an image-quality assessment layer,
    designed to detect covariate shifts effectively. This Adversarial Variational Autoencoder prioritizes the discriminator's
    role, using the suboptimal outputs of the generator as negative samples to fine-tune the discriminator's ability to identify
    high-frequency artifacts. Images generated by adversarial networks often exhibit severe high-frequency artifacts, guiding
    the discriminator to focus excessively on these components. This makes the discriminator ideal for this approach. Trained
    on patches from X-ray images of specific machine models, AdverX-Ray can evaluate whether a scan matches the training distribution,
    or if a scan from the same machine is captured under different settings. Extensive comparisons with various OOD detection
    methods show that AdverX-Ray significantly outperforms existing techniques, achieving a 96.2% average AUROC using only
    64 random patches from an X-ray. Its lightweight and fast architecture makes it suitable for real-time applications, enhancing
    the reliability of medical imaging systems. The code and pretrained models are publicly available.
