- id: deepmill-neural-accessibility-learning-for-subtractive-manu-2025
  title: 'DeepMill: Neural Accessibility Learning for Subtractive Manufacturing'
  abstract: Manufacturability is vital for product design and production, with accessibility being a key element, especially
    in subtractive manufacturing. Traditional methods for geometric accessibility analysis are time-consuming and struggle
    with scalability, while existing deep learning approaches in manufacturability analysis often neglect geometric challenges
    in accessibility and are limited to specific model types. In this paper, we introduce DeepMill, the first neural framework
    designed to accurately and efficiently predict inaccessible and occlusion regions under varying machining tool parameters,
    applicable to both CAD and freeform models. To address the challenges posed by cutter collisions and the lack of extensive
    training datasets, we construct a cutter-aware dual-head octree-based convolutional neural network (O-CNN) and generate
    an inaccessible and occlusion regions analysis dataset with a variety of cutter sizes for network training. Experiments
    demonstrate that DeepMill achieves 94.7% accuracy in predicting inaccessible regions and 88.7% accuracy in identifying
    occlusion regions, with an average processing time of 0.04 seconds for complex geometries. Based on the outcomes, DeepMill
    implicitly captures both local and global geometric features, as well as the complex interactions between cutters and
    intricate 3D models.
