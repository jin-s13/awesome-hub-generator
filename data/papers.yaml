- id: adaptive-backdoor-attacks-with-reasonable-constraints-on-gra-2025
  title: Adaptive Backdoor Attacks with Reasonable Constraints on Graph Neural Networks
  abstract: Recent studies show that graph neural networks (GNNs) are vulnerable to backdoor attacks. Existing backdoor attacks
    against GNNs use fixed-pattern triggers and lack reasonable trigger constraints, overlooking individual graph characteristics
    and rendering insufficient evasiveness. To tackle the above issues, we propose ABARC, the first Adaptive Backdoor Attack
    with Reasonable Constraints, applying to both graph-level and node-level tasks in GNNs. For graph-level tasks, we propose
    a subgraph backdoor attack independent of the graph's topology. It dynamically selects trigger nodes for each target graph
    and modifies node features with constraints based on graph similarity, feature range, and feature type. For node-level
    tasks, our attack begins with an analysis of node features, followed by selecting and modifying trigger features, which
    are then constrained by node similarity, feature range, and feature type. Furthermore, an adaptive edge-pruning mechanism
    is designed to reduce the impact of neighbors on target nodes, ensuring a high attack success rate (ASR). Experimental
    results show that even with reasonable constraints for attack evasiveness, our attack achieves a high ASR while incurring
    a marginal clean accuracy drop (CAD). When combined with the state-of-the-art defense randomized smoothing (RS) method,
    our attack maintains an ASR over 94%, surpassing existing attacks by more than 7%.
