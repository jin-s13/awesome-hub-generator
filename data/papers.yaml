- id: generating-cad-code-with-vision-language-models-for-3d-desig-2024
  title: Generating CAD Code with Vision-Language Models for 3D Designs
  abstract: Generative AI has transformed the fields of Design and Manufacturing by providing efficient and automated methods
    for generating and modifying 3D objects. One approach involves using Large Language Models (LLMs) to generate Computer-
    Aided Design (CAD) scripting code, which can then be executed to render a 3D object; however, the resulting 3D object
    may not meet the specified requirements. Testing the correctness of CAD generated code is challenging due to the complexity
    and structure of 3D objects (e.g., shapes, surfaces, and dimensions) that are not feasible in code. In this paper, we
    introduce CADCodeVerify, a novel approach to iteratively verify and improve 3D objects generated from CAD code. Our approach
    works by producing ameliorative feedback by prompting a Vision-Language Model (VLM) to generate and answer a set of validation
    questions to verify the generated object and prompt the VLM to correct deviations. To evaluate CADCodeVerify, we introduce,
    CADPrompt, the first benchmark for CAD code generation, consisting of 200 natural language prompts paired with expert-annotated
    scripting code for 3D objects to benchmark progress. Our findings show that CADCodeVerify improves VLM performance by
    providing visual feedback, enhancing the structure of the 3D objects, and increasing the success rate of the compiled
    program. When applied to GPT-4, CADCodeVerify achieved a 7.30% reduction in Point Cloud distance and a 5.0% improvement
    in success rate compared to prior work
