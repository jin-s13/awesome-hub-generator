- id: robust-containment-queries-over-collections-of-trimmed-nurbs-2025
  title: Robust Containment Queries over Collections of Trimmed NURBS Surfaces via Generalized Winding Numbers
  abstract: We propose a containment query that is robust to the watertightness of regions bound by trimmed NURBS surfaces,
    as this property is difficult to guarantee for in-the-wild CAD models. Containment is determined through the generalized
    winding number (GWN), a mathematical construction that is indifferent to the arrangement of surfaces in the shape. Applying
    contemporary techniques for the 3D GWN to trimmed NURBS surfaces requires some form of geometric discretization, introducing
    computational inefficiency to the algorithm and even risking containment misclassifications near the surface. In contrast,
    our proposed method leverages properties of the 3D solid angle to solve the relevant surface integral using a boundary
    formulation with rapidly converging adaptive quadrature. Batches of queries are further accelerated by \textit{memoizing}
    (i.e. caching and reusing) quadrature node positions and tangents as they are evaluated. We demonstrate that our GWN method
    is robust to complex trimming geometry in a CAD model, and is accurate up to arbitrary precision at arbitrary distances
    from the surface. The derived containment query is therefore robust to model non-watertightness while respecting all curved
    features of the input shape.
