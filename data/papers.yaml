- id: pedicle-screw-pairing-and-registration-for-screw-pose-estima-2025
  title: Pedicle Screw Pairing and Registration for Screw Pose Estimation from Dual C-arm Images Using CAD Models
  abstract: Accurate matching of pedicle screws in both anteroposterior (AP) and lateral (LAT) images is critical for successful
    spinal decompression and stabilization during surgery. However, establishing screw correspondence, especially in LAT views,
    remains a significant clinical challenge. This paper introduces a method to address pedicle screw correspondence and pose
    estimation from dual C-arm images. By comparing screw combinations, the approach demonstrates consistent accuracy in both
    pairing and registration tasks. The method also employs 2D-3D alignment with screw CAD 3D models to accurately pair and
    estimate screw pose from dual views. Our results show that the correct screw combination consistently outperforms incorrect
    pairings across all test cases, even prior to registration. After registration, the correct combination further enhances
    alignment between projections and images, significantly reducing projection error. This approach shows promise for improving
    surgical outcomes in spinal procedures by providing reliable feedback on screw positioning.
