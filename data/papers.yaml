- id: fiat-net-detecting-fibroatheroma-plaque-cap-in-3d-intravasc-2024
  title: 'FiAt-Net: Detecting Fibroatheroma Plaque Cap in 3D Intravascular OCT Images'
  abstract: The key manifestation of coronary artery disease (CAD) is development of fibroatheromatous plaque, the cap of
    which may rupture and subsequently lead to coronary artery blocking and heart attack. As such, quantitative analysis of
    coronary plaque, its plaque cap, and consequently the cap's likelihood to rupture are of critical importance when assessing
    a risk of cardiovascular events. This paper reports a new deep learning based approach, called FiAt-Net, for detecting
    angular extent of fibroatheroma (FA) and segmenting its cap in 3D intravascular optical coherence tomography (IVOCT) images.
    IVOCT 2D image frames are first associated with distinct clusters and data from each cluster are used for model training.
    As plaque is typically focal and thus unevenly distributed, a binary partitioning method is employed to identify FA plaque
    areas to focus on to mitigate the data imbalance issue. Additional image representations (called auxiliary images) are
    generated to capture IVOCT intensity changes to help distinguish FA and non-FA areas on the coronary wall. Information
    in varying scales is derived from the original IVOCT and auxiliary images, and a multi-head self-attention mechanism is
    employed to fuse such information. Our FiAt-Net achieved high performance on a 3D IVOCT coronary image dataset, demonstrating
    its effectiveness in accurately detecting FA cap in IVOCT images.
