- id: ram-w600-a-multi-task-wrist-dataset-and-benchmark-for-rheum-2025
  title: 'RAM-W600: A Multi-Task Wrist Dataset and Benchmark for Rheumatoid Arthritis'
  abstract: 'Rheumatoid arthritis (RA) is a common autoimmune disease that has been the focus of research in computer-aided
    diagnosis (CAD) and disease monitoring. In clinical settings, conventional radiography (CR) is widely used for the screening
    and evaluation of RA due to its low cost and accessibility. The wrist is a critical region for the diagnosis of RA. However,
    CAD research in this area remains limited, primarily due to the challenges in acquiring high-quality instance-level annotations.
    (i) The wrist comprises numerous small bones with narrow joint spaces, complex structures, and frequent overlaps, requiring
    detailed anatomical knowledge for accurate annotation. (ii) Disease progression in RA often leads to osteophyte, bone
    erosion (BE), and even bony ankylosis, which alter bone morphology and increase annotation difficulty, necessitating expertise
    in rheumatology. This work presents a multi-task dataset for wrist bone in CR, including two tasks: (i) wrist bone instance
    segmentation and (ii) Sharp/van der Heijde (SvdH) BE scoring, which is the first public resource for wrist bone instance
    segmentation. This dataset comprises 1048 wrist conventional radiographs of 388 patients from six medical centers, with
    pixel-level instance segmentation annotations for 618 images and SvdH BE scores for 800 images. This dataset can potentially
    support a wide range of research tasks related to RA, including joint space narrowing (JSN) progression quantification,
    BE detection, bone deformity evaluation, and osteophyte detection. It may also be applied to other wrist-related tasks,
    such as carpal bone fracture localization. We hope this dataset will significantly lower the barrier to research on wrist
    RA and accelerate progress in CAD research within the RA-related domain.'
