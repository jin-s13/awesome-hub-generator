- id: view2cad-reconstructing-view-centric-cad-models-from-single-2025
  title: 'View2CAD: Reconstructing View-Centric CAD Models from Single RGB-D Scans'
  abstract: Parametric CAD models, represented as Boundary Representations (B-reps), are foundational to modern design and
    manufacturing workflows, offering the precision and topological breakdown required for downstream tasks such as analysis,
    editing, and fabrication. However, B-Reps are often inaccessible due to conversion to more standardized, less expressive
    geometry formats. Existing methods to recover B-Reps from measured data require complete, noise-free 3D data, which are
    laborious to obtain. We alleviate this difficulty by enabling the precise reconstruction of CAD shapes from a single RGB-D
    image. We propose a method that addresses the challenge of reconstructing only the observed geometry from a single view.
    To allow for these partial observations, and to avoid hallucinating incorrect geometry, we introduce a novel view-centric
    B-rep (VB-Rep) representation, which incorporates structures to handle visibility limits and encode geometric uncertainty.
    We combine panoptic image segmentation with iterative geometric optimization to refine and improve the reconstruction
    process. Our results demonstrate high-quality reconstruction on synthetic and real RGB-D data, showing that our method
    can bridge the reality gap.
