- id: computer-aided-design-generation-by-cascaded-discrete-diffus-2026
  title: Computer-Aided Design Generation by Cascaded Discrete Diffusion Model
  abstract: 'Recent deep learning approaches seek to automate CAD creation by representing a model as a sequence of discrete
    commands and parameters, and then generating them using autoregressive models or continuous diffusion operating in Euclidean
    embedding space. However, continuous diffusion perturbs representations in a continuous Euclidean domain that does not
    reflect the inherently discrete and heterogeneous nature of CAD tokens, often producing perturbed representations that
    map to semantically invalid symbols. To overcome this limitation, we propose a cascaded discrete diffusion framework for
    CAD generation, which consists of a command diffusion for generating CAD commands and a parameter diffusion conditioned
    on CAD commands. Unlike isotropic Gaussian perturbation, the forward process of our approach operates directly over categorical
    token distributions using delicate transition matrices. For commands, we adopt an absorbing-state transition matrix that
    progressively corrupts tokens to a designated symbol; for parameters, we introduce specific transition matrices tailored
    to heterogeneous attributes: a Gaussian kernel for coordinate continuity, a scale-invariant kernel for dimensional values,
    and a prior-preserving kernel for boolean attributes. The reverse process is achieved by two denoising networks: a Transformer-based
    encoder for command recovery, and a parameter network with extra local self-attention for command-level interaction and
    cross-attention for conditional injection. Experiments on the DeepCAD dataset show that the proposed approach surpasses
    existing autoregressive and continuous diffusion models on unconditional generation metrics, while qualitative results
    validate effective controllability in conditional generation tasks. Source codes will be released.'
