- id: from-idea-to-cad-a-language-model-driven-multi-agent-system-2025
  title: 'From Idea to CAD: A Language Model-Driven Multi-Agent System for Collaborative Design'
  abstract: Creating digital models using Computer Aided Design (CAD) is a process that requires in-depth expertise. In industrial
    product development, this process typically involves entire teams of engineers, spanning requirements engineering, CAD
    itself, and quality assurance. We present an approach that mirrors this team structure with a Vision Language Model (VLM)-based
    Multi Agent System, with access to parametric CAD tooling and tool documentation. Combining agents for requirements engineering,
    CAD engineering, and vision-based quality assurance, a model is generated automatically from sketches and/ or textual
    descriptions. The resulting model can be refined collaboratively in an iterative validation loop with the user. Our approach
    has the potential to increase the effectiveness of design processes, both for industry experts and for hobbyists who create
    models for 3D printing. We demonstrate the potential of the architecture at the example of various design tasks and provide
    several ablations that show the benefits of the architecture's individual components.
