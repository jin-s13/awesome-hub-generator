- id: m3dlayout-a-multi-source-dataset-of-3d-indoor-layouts-and-s-2025
  title: 'M3DLayout: A Multi-Source Dataset of 3D Indoor Layouts and Structured Descriptions for 3D Generation'
  abstract: 'In text-driven 3D scene generation, object layout serves as a crucial intermediate representation that bridges
    high-level language instructions with detailed geometric output. It not only provides a structural blueprint for ensuring
    physical plausibility but also supports semantic controllability and interactive editing. However, the learning capabilities
    of current 3D indoor layout generation models are constrained by the limited scale, diversity, and annotation quality
    of existing datasets. To address this, we introduce M3DLayout, a large-scale, multi-source dataset for 3D indoor layout
    generation. M3DLayout comprises 21,367 layouts and over 433k object instances, integrating three distinct sources: real-world
    scans, professional CAD designs, and procedurally generated scenes. Each layout is paired with detailed structured text
    describing global scene summaries, relational placements of large furniture, and fine-grained arrangements of smaller
    items. This diverse and richly annotated resource enables models to learn complex spatial and semantic patterns across
    a wide variety of indoor environments. To assess the potential of M3DLayout, we establish a benchmark using both a text-conditioned
    diffusion model and a text-conditioned autoregressive model. Experimental results demonstrate that our dataset provides
    a solid foundation for training layout generation models. Its multi-source composition enhances diversity, notably through
    the Inf3DLayout subset which provides rich small-object information, enabling the generation of more complex and detailed
    scenes. We hope that M3DLayout can serve as a valuable resource for advancing research in text-driven 3D scene synthesis.
    All dataset and code will be made public upon acceptance.'
