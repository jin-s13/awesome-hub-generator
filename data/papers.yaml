- id: entropy-rectifying-guidance-for-diffusion-and-flow-models-2025
  title: Entropy Rectifying Guidance for Diffusion and Flow Models
  abstract: 'Guidance techniques are commonly used in diffusion and flow models to improve image quality and input consistency
    for conditional generative tasks such as class-conditional and text-to-image generation. In particular, classifier-free
    guidance (CFG) is the most widely adopted guidance technique. It results, however, in trade-offs across quality, diversity
    and consistency: improving some at the expense of others. While recent work has shown that it is possible to disentangle
    these factors to some extent, such methods come with an overhead of requiring an additional (weaker) model, or require
    more forward passes per sampling step. In this paper, we propose Entropy Rectifying Guidance (ERG), a simple and effective
    guidance method based on inference-time changes in the attention mechanism of state-of-the-art diffusion transformer architectures,
    which allows for simultaneous improvements over image quality, diversity and prompt consistency. ERG is more general than
    CFG and similar guidance techniques, as it extends to unconditional sampling. We show that ERG results in significant
    improvements in various tasks, including text-to-image, class-conditional and unconditional image generation. We also
    show that ERG can be seamlessly combined with other recent guidance methods such as CADS and APG, further improving generation
    results.'
