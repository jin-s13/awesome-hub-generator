- id: intelligent-cad-2-0-2024
  title: Intelligent CAD 2.0
  abstract: 'Integrating modern artificial intelligence (AI) techniques, particularly generative AI, holds the promise of
    revolutionizing computer-aided design (CAD) tools and the engineering design process. However, the direction of "AI+CAD"
    remains unclear: how will the current generation of intelligent CAD (ICAD) differ from its predecessor in the 1980s and
    1990s, what strategic pathways should researchers and engineers pursue for its implementation, and what potential technical
    challenges might arise? As an attempt to address these questions, this paper investigates the transformative role of modern
    AI techniques in advancing CAD towards ICAD. It first analyzes the design process and reconsiders the roles AI techniques
    can assume in this process, highlighting how they can restructure the path humans, computers, and designs interact with
    each other. The primary conclusion is that ICAD systems should assume an intensional rather than extensional role in the
    design process. This offers insights into the evaluation of the previous generation of ICAD (ICAD 1.0) and outlines a
    prospective framework and trajectory for the next generation of ICAD (ICAD 2.0).'
