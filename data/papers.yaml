- id: dropmicrofluidagents-dmfas-autonomous-droplet-microfluidi-2024
  title: 'DropMicroFluidAgents (DMFAs): Autonomous Droplet Microfluidic Research Framework Through Large Language Model Agents'
  abstract: 'Applying Large language models (LLMs) within specific domains requires substantial adaptation to account for
    the unique terminologies, nuances, and context-specific challenges inherent to those areas. Here, we introduce DropMicroFluidAgents
    (DMFAs), an advanced language-driven framework leveraging state-of-the-art pre-trained LLMs. DMFAs employs LLM agents
    to perform two key functions: (1) delivering focused guidance, answers, and suggestions specific to droplet microfluidics
    and (2) generating machine learning models to optimise and automate the design of droplet microfluidic devices, including
    the creation of code-based computer-aided design (CAD) scripts to enable rapid and precise design execution. Experimental
    evaluations demonstrated that the integration of DMFAs with the LLAMA3.1 model yielded the highest accuracy of 76.15%,
    underscoring the significant performance enhancement provided by agent integration. This effect was particularly pronounced
    when DMFAs were paired with the GEMMA2 model, resulting in a 34.47% improvement in accuracy compared to the standalone
    GEMMA2 configuration. This study demonstrates the effective use of LLM agents in droplet microfluidics research as powerful
    tools for automating workflows, synthesising knowledge, optimising designs, and interacting with external systems. These
    capabilities enable their application across education and industrial support, driving greater efficiency in scientific
    discovery and innovation.'
