- id: a-multi-stage-hybrid-framework-for-automated-interpretation-2025
  title: A Multi-Stage Hybrid Framework for Automated Interpretation of Multi-View Engineering Drawings Using Vision Language
    Model
  abstract: 'Engineering drawings are fundamental to manufacturing communication, serving as the primary medium for conveying
    design intent, tolerances, and production details. However, interpreting complex multi-view drawings with dense annotations
    remains challenging using manual methods, generic optical character recognition (OCR) systems, or traditional deep learning
    approaches, due to varied layouts, orientations, and mixed symbolic-textual content. To address these challenges, this
    paper proposes a three-stage hybrid framework for the automated interpretation of 2D multi-view engineering drawings using
    modern detection and vision language models (VLMs). In the first stage, YOLOv11-det performs layout segmentation to localize
    key regions such as views, title blocks, and notes. The second stage uses YOLOv11-obb for orientation-aware, fine-grained
    detection of annotations, including measures, GDT symbols, and surface roughness indicators. The third stage employs two
    Donut-based, OCR-free VLMs for semantic content parsing: the Alphabetical VLM extracts textual and categorical information
    from title blocks and notes, while the Numerical VLM interprets quantitative data such as measures, GDT frames, and surface
    roughness. Two specialized datasets were developed to ensure robustness and generalization: 1,000 drawings for layout
    detection and 1,406 for annotation-level training. The Alphabetical VLM achieved an overall F1 score of 0.672, while the
    Numerical VLM reached 0.963, demonstrating strong performance in textual and quantitative interpretation, respectively.
    The unified JSON output enables seamless integration with CAD and manufacturing databases, providing a scalable solution
    for intelligent engineering drawing analysis.'
