- id: a-comparative-study-of-3d-model-acquisition-methods-for-synt-2026
  title: A Comparative Study of 3D Model Acquisition Methods for Synthetic Data Generation of Agricultural Products
  abstract: In the manufacturing industry, computer vision systems based on artificial intelligence (AI) are widely used to
    reduce costs and increase production. Training these AI models requires a large amount of training data that is costly
    to acquire and annotate, especially in high-variance, low-volume manufacturing environments. A popular approach to reduce
    the need for real data is the use of synthetic data that is generated by leveraging computer-aided design (CAD) models
    available in the industry. However, in the agricultural industry these models are not readily available, increasing the
    difficulty in leveraging synthetic data. In this paper, we present different techniques for substituting CAD files to
    create synthetic datasets. We measure their relative performance when used to train an AI object detection model to separate
    stones and potatoes in a bin picking environment. We demonstrate that using highly representative 3D models acquired by
    scanning or using image-to-3D approaches can be used to generate synthetic data for training object detection models.
    Finetuning on a small real dataset can significantly improve the performance of the models and even get similar performance
    when less representative models are used.
