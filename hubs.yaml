# Managed local hub checkouts.
#
# These are normal git repositories under .local/. They are intentionally not
# submodules: each hub owns its generated data and deployment history, while this
# generator owns the tooling and templates.
hubs:
  - name: awesome-world-model-hub
    title: Awesome World Model Hub
    path: .local/awesome-world-model-hub
    repo: git@github.com:jin-s13/awesome-world-model-hub.git
    branch: main
    site_url: https://jin-s13.github.io/awesome-world-model-hub/zh

  - name: awesome-ai4cad-hub
    title: Awesome AI4CAD Hub
    path: .local/awesome-ai4cad-hub
    repo: git@github.com:jin-s13/awesome-AI4CAD-hub.git
    branch: main
    site_url: https://jin-s13.github.io/awesome-AI4CAD-hub/en
