name: Fetch teasers — download paper teaser images

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1"      # 每周一 UTC 10:00

permissions:
  contents: write

jobs:
  fetch-teasers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore hub data cache
        uses: actions/cache@v4
        with:
          path: |
            .local/data
            .local/assets
          key: hub-data-${{ github.run_id }}
          restore-keys: |
            hub-data-

      - name: Fetch teaser images
        run: python scripts/fetch_teasers.py
        env:
          HUB_DATA_DIR: .local/data
          HUB_ASSETS_DIR: .local/assets/papers
