name: Daily update — check for new papers

on:
  schedule:
    - cron: "0 8 * * *"      # 每天 UTC 0:00 (北京时间 8:00)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: .local/website/package.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install arxiv-daily-researcher dependencies
        run: python -m pip install -r arxiv-daily-researcher/requirements.txt

      - name: Restore hub data cache
        uses: actions/cache@v4
        with:
          path: |
            .local/data
            .local/assets
          key: hub-data-${{ github.run_id }}
          restore-keys: |
            hub-data-

      - name: Configure LLM keys
        run: |
          echo "ARK_API_KEY=${{ secrets.ARK_API_KEY }}" >> $GITHUB_ENV
          echo "ARK_API_BASE_URL=${{ secrets.ARK_API_BASE_URL || 'https://ark.cn-beijing.volces.com/api/v3' }}" >> $GITHUB_ENV
          echo "ARK_MODEL_NAME=${{ secrets.ARK_MODEL_NAME || 'deepseek-v4-flash-260425' }}" >> $GITHUB_ENV
          echo "SMART_MODEL_NAME=${{ secrets.SMART_MODEL_NAME || secrets.ARK_MODEL_NAME || 'deepseek-v4-flash-260425' }}" >> $GITHUB_ENV

      - name: Daily update
        run: python scripts/update.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.local/website/dist
          publish_branch: gh-pages
          force_orphan: true
