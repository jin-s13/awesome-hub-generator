name: Daily update — check for new papers

on:
  schedule:
    - cron: "0 8 * * *"      # 每天 UTC 0:00 (北京时间 8:00)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: output/website/package.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Configure LLM keys
        run: |
          echo "CHEAP_LLM__API_KEY=${{ secrets.CHEAP_LLM__API_KEY }}" >> $GITHUB_ENV
          echo "CHEAP_LLM__BASE_URL=${{ secrets.CHEAP_LLM__BASE_URL }}" >> $GITHUB_ENV
          echo "CHEAP_LLM__MODEL_NAME=${{ secrets.CHEAP_LLM__MODEL_NAME || 'deepseek-v4-flash' }}" >> $GITHUB_ENV
          echo "SMART_LLM__API_KEY=${{ secrets.SMART_LLM__API_KEY || secrets.CHEAP_LLM__API_KEY }}" >> $GITHUB_ENV
          echo "SMART_LLM__BASE_URL=${{ secrets.SMART_LLM__BASE_URL || secrets.CHEAP_LLM__BASE_URL }}" >> $GITHUB_ENV
          echo "SMART_LLM__MODEL_NAME=${{ secrets.SMART_LLM__MODEL_NAME || secrets.CHEAP_LLM__MODEL_NAME || 'deepseek-v4-flash' }}" >> $GITHUB_ENV

      - name: Daily update
        run: python scripts/update.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily update $(date +%Y-%m-%d)"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/website/dist
          publish_branch: gh-pages
          force_orphan: true
