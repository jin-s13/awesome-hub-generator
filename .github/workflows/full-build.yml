name: Full build — generate awesome site from scratch

on:
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Search keywords (comma-separated)'
        required: false
        type: string
      date_from:
        description: 'Start date (YYYY-MM-DD)'
        required: false
        type: string
      skip_llm:
        description: 'Skip LLM classification'
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: output/website/package.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Configure LLM keys
        run: |
          echo "CHEAP_LLM__API_KEY=${{ secrets.CHEAP_LLM__API_KEY }}" >> $GITHUB_ENV
          echo "CHEAP_LLM__BASE_URL=${{ secrets.CHEAP_LLM__BASE_URL }}" >> $GITHUB_ENV
          echo "CHEAP_LLM__MODEL_NAME=${{ secrets.CHEAP_LLM__MODEL_NAME || 'deepseek-v4-flash' }}" >> $GITHUB_ENV
          echo "SMART_LLM__API_KEY=${{ secrets.SMART_LLM__API_KEY || secrets.CHEAP_LLM__API_KEY }}" >> $GITHUB_ENV
          echo "SMART_LLM__BASE_URL=${{ secrets.SMART_LLM__BASE_URL || secrets.CHEAP_LLM__BASE_URL }}" >> $GITHUB_ENV
          echo "SMART_LLM__MODEL_NAME=${{ secrets.SMART_LLM__MODEL_NAME || secrets.CHEAP_LLM__MODEL_NAME || 'deepseek-v4-flash' }}" >> $GITHUB_ENV

      - name: Full build
        run: |
          python scripts/build.py \
            ${KEYWORDS:+--keywords $KEYWORDS} \
            ${DATE_FROM:+--date-from $DATE_FROM} \
            ${{ inputs.skip_llm && '--skip-llm' || '' }}
        env:
          KEYWORDS: ${{ inputs.keywords }}
          DATE_FROM: ${{ inputs.date_from }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/website/dist
          publish_branch: gh-pages
          force_orphan: true
