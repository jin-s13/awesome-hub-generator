name: Full build — generate awesome site from scratch

on:
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Search keywords (comma-separated)'
        required: false
        type: string
      date_from:
        description: 'Start date (YYYY-MM-DD)'
        required: false
        type: string
      skip_llm:
        description: 'Skip LLM classification'
        default: false
        type: boolean
      skip_download:
        description: 'Skip PDF download and interpretation'
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: .local/website/package.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install arxiv-daily-researcher dependencies
        run: python -m pip install -r arxiv-daily-researcher/requirements.txt

      - name: Configure LLM keys
        run: |
          echo "ARK_API_KEY=${{ secrets.ARK_API_KEY }}" >> $GITHUB_ENV
          echo "ARK_API_BASE_URL=${{ secrets.ARK_API_BASE_URL || 'https://ark.cn-beijing.volces.com/api/v3' }}" >> $GITHUB_ENV
          echo "ARK_MODEL_NAME=${{ secrets.ARK_MODEL_NAME || 'deepseek-v4-flash-260425' }}" >> $GITHUB_ENV
          echo "SMART_MODEL_NAME=${{ secrets.SMART_MODEL_NAME || secrets.ARK_MODEL_NAME || 'deepseek-v4-flash-260425' }}" >> $GITHUB_ENV

      - name: Full build
        run: |
          python scripts/build.py \
            ${KEYWORDS:+--keywords $KEYWORDS} \
            ${DATE_FROM:+--date-from $DATE_FROM} \
            ${{ inputs.skip_llm && '--skip-llm' || '' }} \
            ${{ inputs.skip_download && '--skip-download' || '' }}
        env:
          KEYWORDS: ${{ inputs.keywords }}
          DATE_FROM: ${{ inputs.date_from }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.local/website/dist
          publish_branch: gh-pages
          force_orphan: true
